# docker-compose.yml — News Sentry 部署
#
# 使用方法:
#   docker compose up -d              # 启动 core 镜像
#   docker compose up -d --profile full  # 启动 full 镜像（含浏览器）
#
# 首次启动请设置 ANTHROPIC_API_KEY:
#   echo "ANTHROPIC_API_KEY=sk-ant-..." > .env

services:
  news-sentry:
    image: ghcr.io/xucroyuri/news-sentry:core
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - news-sentry-data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  news-sentry-data:
