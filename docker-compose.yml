services:
  news-sentry:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/xucroyuri/news-sentry:latest
    env_file:
      - .env
    environment:
      - TARGET_ID=italy
      - RUN_STAGE=all
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./session-profiles:/app/session-profiles
      - ./chrome-data:/home/appuser/.config/chromium
    tmpfs:
      - /tmp
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
