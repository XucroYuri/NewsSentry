services:
  news-sentry:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/xucroyuri/news-sentry:0.5.0
    env_file: .env
    environment:
      - TARGET_ID=italy
      - RUN_STAGE=all
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    tmpfs:
      - /tmp
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: run --target italy --stage all --profile cloud-vps

  news-sentry-full:
    build:
      context: .
      dockerfile: Dockerfile.full
    image: ghcr.io/xucroyuri/news-sentry-full:0.5.0
    env_file: .env
    environment:
      - TARGET_ID=italy
      - RUN_STAGE=all
      - NEWSSENTRY_AI_BUDGET_USD=1.0
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    tmpfs:
      - /tmp
    restart: unless-stopped
    mem_limit: 6g
    cpus: 1.5
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    command: run --target italy --stage all --profile cloud-vps
