# docker-compose.yml — News Sentry v2 部署
#
# 使用方法:
#   docker compose up -d
#
# 首次启动请设置环境变量（.env 或直接 export）:
#   GEMINI_API_KEY=xxx
#   DEEPSEEK_API_KEY=xxx
#   GROQ_API_KEY=xxx

services:
  news-sentry:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - news-sentry-data:/app/data
      - ./config:/app/config:ro
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  rss-bridge:
    image: rssbridge/rss-bridge:latest
    ports:
      - "127.0.0.1:13080:80"
    volumes:
      - ./rss-bridge/whitelist.txt:/app/whitelist.txt:ro
      - ./rss-bridge/config.ini.php:/app/config.ini.php:ro
    restart: unless-stopped

volumes:
  news-sentry-data:
