name: Deploy

on:
  push:
    branches: [main, preview]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: preview
        type: choice
        options: [preview, production]

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/public/package-lock.json
            frontend/admin/package-lock.json
            frontend/cloudflare/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,proxy]"

      - name: Install public frontend dependencies
        working-directory: frontend/public
        run: npm ci

      - name: Public frontend lint
        working-directory: frontend/public
        run: npm run lint

      - name: Public frontend tests
        working-directory: frontend/public
        run: npm run test

      - name: Public frontend build
        working-directory: frontend/public
        env:
          FRONTEND_OUTPUT_SUBDIR: ${{ github.workspace }}/src/news_sentry/static
          VITE_API_BASE: https://api.news-sentry.com
        run: npm run build

      - name: Install admin frontend dependencies
        working-directory: frontend/admin
        run: npm ci

      - name: Admin frontend lint
        working-directory: frontend/admin
        run: npm run lint

      - name: Admin frontend tests
        working-directory: frontend/admin
        run: npm run test

      - name: Admin frontend build
        working-directory: frontend/admin
        env:
          FRONTEND_OUTPUT_SUBDIR: ${{ github.workspace }}/src/news_sentry/static
        run: npm run build

      - name: Admin E2E Test (Playwright)
        working-directory: frontend/admin
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e

      - name: Install Cloudflare Worker dependencies
        working-directory: frontend/cloudflare
        run: npm ci

      - name: Cloudflare Worker dry run
        working-directory: frontend/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env="" --dry-run --outdir /tmp/ns-worker-dry-run --containers-rollout none

      - name: Lint (ruff)
        run: python -m ruff check

      - name: Type check (mypy)
        run: python -m mypy src/news_sentry/ --ignore-missing-imports

      - name: Test (pytest)
        timeout-minutes: 20
        run: python -m pytest tests/ -q --tb=short --timeout=300 --durations=25

      - name: Publication hygiene scan
        run: python tools/check_publication_hygiene.py

      - name: Security scan
        run: python tools/scan_sensitive_data.py

      - name: Hardcoded target scan
        run: python tools/check_no_hardcoded_target.py

      - name: Config schema validation
        run: python -m pytest tests/unit/test_config_schema_validation.py -q

      - name: E2E tests
        timeout-minutes: 10
        env:
          NEWSSENTRY_DEPLOYMENT_ENV: local
          NEWSSENTRY_AUTO_COLLECT: "0"
          NEWSSENTRY_AI_ENRICHMENT: "0"
          NEWSSENTRY_PUBLIC_TRANSLATION: "0"
        run: |
          set -euo pipefail
          test -f src/news_sentry/static/public_app/index.html
          test -f src/news_sentry/static/admin/index.html
          python -m pytest tests/e2e/ -m e2e -q --tb=short --timeout=60 -x

  cloudflare-data:
    name: Cloudflare D1 schema migration
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preview' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install D1 backfill dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/cloudflare/package-lock.json

      - name: Install Cloudflare Worker dependencies
        working-directory: frontend/cloudflare
        run: npm ci

      - name: Cloudflare D1 backfill dry run
        run: |
          python tools/cloudflare_d1_backfill.py \
            --data-dir data \
            --targets-dir config/targets \
            --dry-run \
            --limit 100 \
            --output-sql /tmp/news-sentry-d1-backfill.sql

      - name: Apply Cloudflare D1 schema
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
        working-directory: frontend/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute ns-db --remote --file=db/schema.sql

  deploy-cloudflare-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [ci, cloudflare-data]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/cloudflare/package-lock.json

      - name: Install Cloudflare Worker dependencies
        working-directory: frontend/cloudflare
        run: npm ci

      - name: Deploy Cloudflare Worker
        working-directory: frontend/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env="" --containers-rollout gradual

      - name: Verify Cloudflare Worker health
        working-directory: frontend/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          for i in $(seq 1 36); do
            STATUS=$(curl -sS \
              -A "Mozilla/5.0 (compatible; NewsSentryDeploy/1.0; +https://news-sentry.com)" \
              -H "Accept: application/json" \
              -o /tmp/worker-health.json \
              -w "%{http_code}" \
              "https://api.news-sentry.com/api/v1/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              cat /tmp/worker-health.json
              exit 0
            fi
            if grep -qi "Just a moment" /tmp/worker-health.json 2>/dev/null; then
              echo "::warning::Cloudflare Challenge blocked GitHub Actions runner; falling back to D1 smoke check."
              npx wrangler d1 execute ns-db --remote \
                --command "SELECT COUNT(*) AS total_events, MAX(collected_at) AS latest_collected_at FROM events"
              exit 0
            fi
            echo "Waiting for Worker deployment... (attempt $i, HTTP $STATUS)"
            if [ -s /tmp/worker-health.json ]; then
              head -c 500 /tmp/worker-health.json || true
              echo
            fi
            sleep 5
          done
          echo "Cloudflare Worker health check failed"
          exit 1

  deploy-cloudflare-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preview' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    outputs:
      pages_url: ${{ steps.deploy.outputs.pages_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/public/package-lock.json

      - name: Install public frontend dependencies
        working-directory: frontend/public
        run: npm ci

      - name: Build public frontend
        working-directory: frontend/public
        env:
          VITE_API_BASE: https://api.news-sentry.com
        run: npm run build

      - name: Deploy Cloudflare Pages
        id: deploy
        working-directory: frontend/public
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          branch="${GITHUB_REF_NAME:-preview}"
          npx wrangler pages deploy dist/ \
            --project-name=news-sentry \
            --branch "${branch}" \
            --commit-dirty=true | tee /tmp/news-sentry-pages-deploy.log
          pages_url="$(grep -Eo 'https://[^[:space:]]+\\.pages\\.dev' /tmp/news-sentry-pages-deploy.log | tail -1 || true)"
          if [ -z "${pages_url}" ]; then
            pages_url="https://news-sentry.pages.dev"
          fi
          echo "pages_url=${pages_url}" >> "$GITHUB_OUTPUT"

      - name: Verify Cloudflare Pages deployment
        run: |
          set -euo pipefail
          PAGES_URL="${{ steps.deploy.outputs.pages_url }}"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /tmp/pages.html -w "%{http_code}" "$PAGES_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              grep -Eq "News Sentry|NewsSentry" /tmp/pages.html
              exit 0
            fi
            echo "Waiting for Pages deployment... (attempt $i, HTTP $STATUS)"
            sleep 5
          done
          echo "Cloudflare Pages verification timed out"
          exit 1

  verify-preview:
    name: Verify preview
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare-pages, cloudflare-data]
    if: github.ref == 'refs/heads/preview'
    env:
      BASE_URL: https://preview.news-sentry.com
      PAGES_URL: ${{ needs.deploy-cloudflare-pages.outputs.pages_url }}
      API_URL: https://api.news-sentry.com
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/cloudflare/package-lock.json

      - name: Install Cloudflare Worker dependencies
        working-directory: frontend/cloudflare
        run: npm ci

      - name: Verify preview Cloudflare-native public endpoints
        run: |
          set -euo pipefail
          api_ok=1
          curl -fsS -A "Mozilla/5.0 (compatible; NewsSentryDeploy/1.0; +https://news-sentry.com)" -H "Accept: application/json" "${API_URL}/api/v1/health" > /tmp/health.json || api_ok=0
          curl -fsS -A "Mozilla/5.0 (compatible; NewsSentryDeploy/1.0; +https://news-sentry.com)" -H "Accept: application/json" "${API_URL}/api/v1/public/news?page_size=3" > /tmp/public-news.json || api_ok=0
          curl -fsS -A "Mozilla/5.0 (compatible; NewsSentryDeploy/1.0; +https://news-sentry.com)" -H "Accept: application/json" "${API_URL}/api/v1/public/facets" > /tmp/facets.json || api_ok=0
          curl -fsS -o /tmp/public-app.html "${PAGES_URL:-${BASE_URL}}/"
          if [ "$api_ok" != "1" ]; then
            echo "::warning::Cloudflare Challenge blocked GitHub Actions API curl; validating D1 data via Wrangler."
            (cd frontend/cloudflare && npx wrangler d1 execute ns-db --remote \
              --command "SELECT COUNT(*) AS total_events, MAX(collected_at) AS latest_collected_at FROM events")
            exit 0
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          health = json.loads(Path("/tmp/health.json").read_text())
          news = json.loads(Path("/tmp/public-news.json").read_text())
          facets = json.loads(Path("/tmp/facets.json").read_text())

          assert health.get("status") == "ok", "Worker health is not ok"
          assert isinstance(health.get("total_events"), int), "health total_events missing"
          assert isinstance(news.get("items"), list), "public news response missing items"
          assert {"regions", "issues", "related"} <= set(facets), "facets payload missing expected keys"
          public_app_html = Path("/tmp/public-app.html").read_text(errors="ignore")
          assert "News Sentry" in public_app_html or "NewsSentry" in public_app_html
          PY

  promote-main:
    name: Promote main
    runs-on: ubuntu-latest
    needs: verify-preview
    if: github.ref == 'refs/heads/preview'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fast-forward main to verified preview
        run: |
          set -euo pipefail
          git fetch origin main preview
          if ! git merge-base --is-ancestor origin/main "${GITHUB_SHA}"; then
            echo "origin/main is not an ancestor of verified preview ${GITHUB_SHA}; stop promotion."
            exit 1
          fi
          git push origin "${GITHUB_SHA}:refs/heads/main"

  verify-production:
    name: Verify production
    runs-on: ubuntu-latest
    needs: [deploy-cloudflare-worker, deploy-cloudflare-pages, cloudflare-data]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    env:
      BASE_URL: https://news-sentry.com
      PAGES_URL: ${{ needs.deploy-cloudflare-pages.outputs.pages_url }}
      API_URL: https://api.news-sentry.com
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/cloudflare/package-lock.json

      - name: Install Cloudflare Worker dependencies
        working-directory: frontend/cloudflare
        run: npm ci

      - name: Verify production public endpoints
        run: |
          set -euo pipefail
          api_ok=1
          curl -fsS -A "Mozilla/5.0 (compatible; NewsSentryDeploy/1.0; +https://news-sentry.com)" -H "Accept: application/json" "${API_URL}/api/v1/health" > /tmp/health.json || api_ok=0
          curl -fsS -A "Mozilla/5.0 (compatible; NewsSentryDeploy/1.0; +https://news-sentry.com)" -H "Accept: application/json" "${API_URL}/api/v1/public/news?page_size=3" > /tmp/public-news.json || api_ok=0
          curl -fsS -A "Mozilla/5.0 (compatible; NewsSentryDeploy/1.0; +https://news-sentry.com)" -H "Accept: application/json" "${API_URL}/api/v1/public/facets" > /tmp/facets.json || api_ok=0
          curl -fsS -o /tmp/public-app.html "${BASE_URL}/"
          if ! grep -Eq "News Sentry|NewsSentry" /tmp/public-app.html; then
            echo "::warning::Apex homepage did not expose the app shell to GitHub Actions; checking Pages deployment URL."
            curl -fsS -o /tmp/public-app.html "${PAGES_URL:-${BASE_URL}}/"
          fi
          if [ "$api_ok" != "1" ]; then
            echo "::warning::Cloudflare Challenge blocked GitHub Actions API curl; validating D1 data via Wrangler."
            (cd frontend/cloudflare && npx wrangler d1 execute ns-db --remote \
              --command "SELECT COUNT(*) AS total_events, MAX(collected_at) AS latest_collected_at FROM events")
            exit 0
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          health = json.loads(Path("/tmp/health.json").read_text())
          news = json.loads(Path("/tmp/public-news.json").read_text())
          facets = json.loads(Path("/tmp/facets.json").read_text())

          assert health.get("status") == "ok", "Worker health is not ok"
          assert isinstance(health.get("total_events"), int), "health total_events missing"
          assert health.get("total_events", 0) > 0, "Cloudflare D1 has no events"
          assert isinstance(news.get("items"), list) and news["items"], "public news is empty"
          assert {"regions", "issues", "related"} <= set(facets), "facets payload missing expected keys"
          public_app_html = Path("/tmp/public-app.html").read_text(errors="ignore")
          assert "News Sentry" in public_app_html or "NewsSentry" in public_app_html
          PY

      - name: Verify SEO/GEO public site
        run: |
          python -m pip install --upgrade pip -q
          python -m pip install uv -q
          uv run --no-project --with 'httpx[socks]' --with pyyaml \
            python tools/seo_geo/verify_public_site.py \
              --base-url "${BASE_URL}" \
              --timeout-seconds 90 \
              --output /tmp/news-sentry-verify-public-site.json

      - name: Audit deployed surface
        env:
          CLOUDFLARE_STATE_JSON: ${{ secrets.CLOUDFLARE_STATE_JSON }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip -q
          python -m pip install uv -q
          if [ -z "${CLOUDFLARE_STATE_JSON}" ]; then
            echo "Missing CLOUDFLARE_STATE_JSON secret; production deployed-surface audit requires Cloudflare state evidence."
            exit 1
          fi
          printf '%s' "${CLOUDFLARE_STATE_JSON}" > /tmp/news-sentry-cloudflare-state.json
          uv run --no-project --with 'httpx[socks]' --with pyyaml \
            python tools/deployed_surface_audit.py \
              --policy config/security/deployment-surface-policy.yaml \
              --cloudflare-state-json /tmp/news-sentry-cloudflare-state.json \
              --base-url "${BASE_URL}" \
              --output /tmp/news-sentry-deployed-surface-audit.json \
              --timeout-seconds 90
