name: Deploy

on:
  push:
    branches: [main, preview]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: preview
        type: choice
        options: [preview, production]
      allow_temporary_cloudflare_state_bypass:
        description: "TEMPORARY: allow one-off production deploy without CLOUDFLARE_STATE_JSON while Cloudflare evidence is being backfilled"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  # ── Stage 1: CI gate (lint + test + scan) ──────────────────
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/public/package-lock.json
            frontend/admin/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,proxy]"

      - name: Install public frontend dependencies
        working-directory: frontend/public
        run: npm ci

      - name: Public frontend lint
        working-directory: frontend/public
        run: npm run lint

      - name: Public frontend tests
        working-directory: frontend/public
        run: npm run test

      - name: Public frontend build
        working-directory: frontend/public
        run: npm run build

      - name: Install admin frontend dependencies
        working-directory: frontend/admin
        run: npm ci

      - name: Admin frontend lint
        working-directory: frontend/admin
        run: npm run lint

      - name: Admin frontend build
        working-directory: frontend/admin
        run: npm run build

      - name: Lint (ruff)
        run: python -m ruff check

      - name: Type check (mypy)
        run: python -m mypy src/news_sentry/ --ignore-missing-imports

      - name: Test (pytest)
        timeout-minutes: 20
        run: python -m pytest tests/ -q --tb=short --timeout=300 --durations=25

      - name: Publication hygiene scan
        run: python tools/check_publication_hygiene.py

      - name: Security scan
        run: python tools/scan_sensitive_data.py

      - name: Hardcoded target scan
        run: python tools/check_no_hardcoded_target.py

      - name: Config schema validation
        run: python -m pytest tests/unit/test_config_schema_validation.py -q

  # ── Stage 2: Deploy to VPS via SSH (venv + systemd) ───────
  deploy:
    name: Deploy ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/preview'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=production" >> "$GITHUB_OUTPUT"
            echo "SERVICE=news-sentry" >> "$GITHUB_OUTPUT"
            echo "PORT=18080" >> "$GITHUB_OUTPUT"
          else
            echo "ENV=preview" >> "$GITHUB_OUTPUT"
            echo "SERVICE=news-sentry-preview" >> "$GITHUB_OUTPUT"
            echo "PORT=18081" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BWH_HOST }}
          username: ${{ secrets.BWH_SSH_USER }}
          key: ${{ secrets.BWH_SSH_KEY }}
          port: ${{ secrets.BWH_SSH_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail

            ENV="${{ steps.env.outputs.ENV }}"
            SERVICE="${{ steps.env.outputs.SERVICE }}"
            PORT="${{ steps.env.outputs.PORT }}"
            BRANCH="${{ github.ref_name }}"
            SHA="${{ github.sha }}"
            SHORT_SHA="$(echo ${SHA} | cut -c1-7)"
            DEPLOY_BASE="/opt/news-sentry"
            REPO_DIR="${DEPLOY_BASE}/${ENV}/repo"
            REPO_URL="https://github.com/XucroYuri/NewsSentry.git"
            DEPLOY_GITHUB_TOKEN="${{ secrets.GHCR_PAT || github.token }}"
            if [ -z "${DEPLOY_GITHUB_TOKEN}" ]; then
              echo "❌ Missing GitHub token for remote checkout"
              exit 1
            fi
            AUTH_HEADER="AUTHORIZATION: Basic $(printf 'x-access-token:%s' "${DEPLOY_GITHUB_TOKEN}" | base64 | tr -d '\n')"
            unset DEPLOY_GITHUB_TOKEN

            redact_sensitive_log() {
              sed -E \
                -e 's/((password|token|secret|api[_ -]?key|authorization|cookie)[^[:space:]]{0,40}[=:][[:space:]]*)[^[:space:]]+/\1<redacted>/Ig' \
                -e 's/(Bearer )[A-Za-z0-9._-]+/\1<redacted>/Ig'
            }

            echo "=== Deploying NewsSentry ${ENV} (${SHORT_SHA}) on port ${PORT} ==="

            # ── 1. 创建目录（首次） ──
            mkdir -p "${DEPLOY_BASE}/${ENV}"
            mkdir -p "/srv/news-sentry/${ENV}/data"

            backup_dirty_worktree() {
              if [ -z "$(git status --porcelain)" ]; then
                return 0
              fi

              BACKUP_DIR="${DEPLOY_BASE}/${ENV}/deploy-backups/$(date -u +%Y%m%dT%H%M%SZ)-dirty-worktree"
              mkdir -p "${BACKUP_DIR}"
              git status --short > "${BACKUP_DIR}/status.txt"
              git diff > "${BACKUP_DIR}/worktree.diff" || true
              git diff --cached > "${BACKUP_DIR}/index.diff" || true
              git ls-files --others --exclude-standard > "${BACKUP_DIR}/untracked.txt" || true
              echo "⚠️  Backed up dirty deploy worktree to ${BACKUP_DIR}"
            }

            # ── 2. 克隆或更新代码 ──
            if [ -d "${REPO_DIR}/.git" ]; then
              git config --global --add safe.directory "${REPO_DIR}"
              cd "${REPO_DIR}"
              git remote set-url origin "${REPO_URL}"
              git -c http.https://github.com/.extraheader="${AUTH_HEADER}" fetch origin "${BRANCH}"
              backup_dirty_worktree
              git reset --hard
              git clean -fd
              git checkout -B "${BRANCH}" "origin/${BRANCH}"
              git reset --hard "origin/${BRANCH}"
              git clean -fd
            else
              git -c http.https://github.com/.extraheader="${AUTH_HEADER}" clone -b "${BRANCH}" "${REPO_URL}" "${REPO_DIR}"
              cd "${REPO_DIR}"
              git remote set-url origin "${REPO_URL}"
            fi
            unset AUTH_HEADER

            echo "Checked out: $(git log --oneline -1)"

            # ── 3. 公共门户前端构建 ──
            ensure_node_22() {
              if command -v node >/dev/null 2>&1 && command -v npm >/dev/null 2>&1; then
                NODE_MAJOR="$(node -p "Number(process.versions.node.split('.')[0])")"
                if [ "${NODE_MAJOR}" -ge 22 ]; then
                  return 0
                fi
                echo "⚠️  Node $(node -v) found; upgrading to Node 22 for public frontend build"
              else
                echo "⚠️  Node.js/npm missing; installing Node 22 for public frontend build"
              fi

              if command -v apt-get >/dev/null 2>&1; then
                apt-get update -qq
                apt-get install -y -qq ca-certificates curl gnupg
                curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
                apt-get install -y -qq nodejs
              else
                echo "❌ Missing Node.js/npm and unsupported package manager; install Node 22 on VPS"
                exit 1
              fi

              node -v
              npm -v
            }
            ensure_node_22

            upsert_env_kv() {
              FILE="$1"
              KEY="$2"
              VALUE="$3"
              mkdir -p "$(dirname "${FILE}")"
              touch "${FILE}"
              if grep -qE "^${KEY}=" "${FILE}"; then
                sed -i "s|^${KEY}=.*|${KEY}=${VALUE}|" "${FILE}"
              else
                printf "%s=%s\n" "${KEY}" "${VALUE}" >> "${FILE}"
              fi
            }

            ensure_env_kv_missing() {
              FILE="$1"
              KEY="$2"
              VALUE="$3"
              mkdir -p "$(dirname "${FILE}")"
              touch "${FILE}"
              if ! grep -qE "^${KEY}=" "${FILE}"; then
                printf "%s=%s\n" "${KEY}" "${VALUE}" >> "${FILE}"
              fi
            }

            # ── 3a. 公共门户前端构建 ──
            # 仅在 package.json 或源码变更时重新构建
            NPM_HASH_FILE="${DEPLOY_BASE}/${ENV}/.npm-build-hash"
            NPM_HASH_SRC="$(sha256sum "${REPO_DIR}/frontend/public/package.json" | cut -d' ' -f1)"
            NPM_HASH_SRC="${NPM_HASH_SRC}-$(find "${REPO_DIR}/frontend/public/src" -type f -exec sha256sum {} \; | sha256sum | cut -d' ' -f1)"
            if [ ! -f "${NPM_HASH_FILE}" ] || [ "$(cat "${NPM_HASH_FILE}")" != "${NPM_HASH_SRC}" ]; then
              cd "${REPO_DIR}/frontend/public"
              npm ci
              npm run build
              cd "${REPO_DIR}"
              echo "${NPM_HASH_SRC}" > "${NPM_HASH_FILE}"
            fi

            # ── 3b. 管理后台前端构建 ──
            ADMIN_HASH_FILE="${DEPLOY_BASE}/${ENV}/.admin-build-hash"
            ADMIN_HASH_SRC="$(sha256sum "${REPO_DIR}/frontend/admin/package.json" | cut -d' ' -f1)"
            ADMIN_HASH_SRC="${ADMIN_HASH_SRC}-$(find "${REPO_DIR}/frontend/admin/src" -type f -exec sha256sum {} \; | sha256sum | cut -d' ' -f1)"
            if [ ! -f "${ADMIN_HASH_FILE}" ] || [ "$(cat "${ADMIN_HASH_FILE}")" != "${ADMIN_HASH_SRC}" ]; then
              cd "${REPO_DIR}/frontend/admin"
              npm ci
              npm run build
              cd "${REPO_DIR}"
              echo "${ADMIN_HASH_SRC}" > "${ADMIN_HASH_FILE}"
            fi

            # ── 4. venv + 依赖 ──
            VENV="${DEPLOY_BASE}/${ENV}/venv"
            if [ ! -d "${VENV}" ]; then
              python3 -m venv "${VENV}"
            fi
            source "${VENV}/bin/activate"
            pip install --upgrade pip -q

            # 仅在 pyproject.toml 变更或首次安装时重新安装依赖
            PIP_HASH_FILE="${DEPLOY_BASE}/${ENV}/.pip-install-hash"
            PYPROJECT_HASH="$(sha256sum "${REPO_DIR}/pyproject.toml" | cut -d' ' -f1)"
            if [ ! -f "${PIP_HASH_FILE}" ] || [ "$(cat "${PIP_HASH_FILE}")" != "${PYPROJECT_HASH}" ]; then
              pip install -e ".[api,proxy]" -q
              echo "${PYPROJECT_HASH}" > "${PIP_HASH_FILE}"
            fi

            # ── 5. 环境变量 ──
            if [ ! -f "${DEPLOY_BASE}/${ENV}/.env" ]; then
              cat > "${DEPLOY_BASE}/${ENV}/.env" <<'ENVEOF'
            NEWSSENTRY_DEPLOYMENT_ENV=vps
            NEWSSENTRY_PROFILE=cloud-vps
            NEWSSENTRY_DATA_DIR=__DATA_DIR__
            NEWSSENTRY_ALLOW_EXTERNAL_DATA_DIR=1
            NEWSSENTRY_AI_BUDGET_USD=1.0
            NEWSSENTRY_LOG_LEVEL=INFO
            # AI Provider keys — fill at least one after deploy:
            # GEMINI_API_KEY=xxxxxxxx
            # DEEPSEEK_API_KEY=sk-xxxxxxxx
            # GROQ_API_KEY=gsk_xxxxxxxx
            ENVEOF
              sed -i "s|__DATA_DIR__|/srv/news-sentry/${ENV}/data|" "${DEPLOY_BASE}/${ENV}/.env"
            fi
            upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_AUTO_COLLECT" "0"
            upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_PUBLIC_TRANSLATION" "1"
            upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_PUBLIC_TRANSLATION_INTERVAL" "5"
            upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_PUBLIC_TRANSLATION_PER_CYCLE" "50"
            upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_PUBLIC_TRANSLATION_CANDIDATES" "500"
            upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_PUBLIC_PUBLICATION_INTERVAL" "5"
            upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_PUBLIC_PUBLICATION_PER_CYCLE" "50"
            # Admin 密码：从 GitHub Secrets 注入（必设）
            ADMIN_PW="${{ secrets.NEWSSENTRY_ADMIN_PASSWORD }}"
            if [ -n "${ADMIN_PW}" ]; then
              upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_ADMIN_PASSWORD" "${ADMIN_PW}"
            else
              echo "⚠️  NEWSSENTRY_ADMIN_PASSWORD secret is empty — a random password will be generated on first launch"
            fi
            if [ "${ENV}" = "production" ]; then
              upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_REALTIME_BATCH_SIZE" "12"
              upsert_env_kv "${DEPLOY_BASE}/${ENV}/.env" "NEWSSENTRY_REALTIME_STRICT" "0"
            fi

            # ── 6. systemd 服务文件（首次或更新） ──
            cat > "/etc/systemd/system/${SERVICE}.service" <<SVCEOF
            [Unit]
            Description=News Sentry ${ENV} (${SHORT_SHA})
            After=network.target

            [Service]
            Type=simple
            User=newssentry
            Group=newssentry
            WorkingDirectory=${REPO_DIR}
            EnvironmentFile=${DEPLOY_BASE}/${ENV}/.env
            Environment=NEWSSENTRY_ALLOW_EXTERNAL_DATA_DIR=1
            ExecStart=${VENV}/bin/python -m uvicorn news_sentry.core.api_server:create_app --factory --host 127.0.0.1 --port ${PORT}
            Restart=on-failure
            RestartSec=10
            LimitNOFILE=65536
            MemoryMax=768M
            CPUQuota=100%
            NoNewPrivileges=true
            ProtectSystem=strict
            ReadWritePaths=/srv/news-sentry/${ENV} ${DEPLOY_BASE}/${ENV}
            PrivateTmp=true
            StandardOutput=journal
            StandardError=journal
            SyslogIdentifier=${SERVICE}

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            # 确保文件权限
            chown -R newssentry:newssentry "${DEPLOY_BASE}/${ENV}"
            chown -R newssentry:newssentry "/srv/news-sentry/${ENV}"

            # ── 7. 重启服务 ──
            systemctl daemon-reload
            systemctl enable "${SERVICE}"
            systemctl restart "${SERVICE}"

            # ── 8. 健康检查 ──
            echo "Waiting for service..."
            for i in $(seq 1 24); do
              if curl -sf "http://127.0.0.1:${PORT}/api/v1/health" > /dev/null 2>&1; then
                echo "✅ Health check passed (attempt ${i})"
                curl -s "http://127.0.0.1:${PORT}/api/v1/health"
                echo ""
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "❌ Health check failed after 120s"
                journalctl -u "${SERVICE}" --no-pager -n 30 | redact_sensitive_log
                exit 1
              fi
              sleep 5
            done

            # ── 8a. 生产实时采集 timer：配置驱动、分批轮转扩展地区网络 ──
            if [ "${ENV}" = "production" ]; then
              install -m 0644 "${REPO_DIR}/config/news-sentry-realtime.service" /etc/systemd/system/news-sentry-realtime.service
              install -m 0644 "${REPO_DIR}/config/news-sentry-realtime.timer" /etc/systemd/system/news-sentry-realtime.timer
              systemctl daemon-reload
              systemctl enable --now news-sentry-realtime.timer
              systemctl start --no-block news-sentry-realtime.service || true
              systemctl list-timers --all news-sentry-realtime.timer || true
              echo "✅ Production realtime collection timer enabled"
            else
              echo "ℹ️  Skipping realtime collection timer for ${ENV}"
            fi

            # ── 9. 共存安全确认 ──
            systemctl is-active x-ui > /dev/null 2>&1 && echo "✅ Xray proxy: running" || echo "⚠️  Xray proxy: not running"
            ss -lntup | grep -E ':443|:8443' | head -2

            # ── 10. 记录部署版本 ──
            echo "${SHA}" > "${DEPLOY_BASE}/${ENV}/.deploy-sha"
            echo "${BRANCH}" > "${DEPLOY_BASE}/${ENV}/.deploy-branch"
            date -u +%Y-%m-%dT%H:%M:%SZ > "${DEPLOY_BASE}/${ENV}/.deploy-time"

            echo ""
            echo "=== Deploy complete ==="
            echo "  Environment: ${ENV}"
            echo "  Branch:      ${BRANCH}"
            echo "  Commit:      ${SHORT_SHA}"
            echo "  Port:        ${PORT}"
            echo "  Service:     ${SERVICE}"

      - name: Post-deploy summary
        run: |
          echo "## Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | ${{ steps.env.outputs.ENV }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Port | ${{ steps.env.outputs.PORT }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | ${{ steps.env.outputs.SERVICE }} |" >> "$GITHUB_STEP_SUMMARY"

  # ── Stage 2b: Deploy Cloudflare Workers (API server) ──────────
  # 仅 main 分支 push 且 cloudflare 目录变更时触发，或手动 workflow_dispatch
  deploy-cloudflare-worker:
    name: Deploy Cloudflare Worker ${{ github.ref == 'refs/heads/main' && '(production)' || '' }}
    runs-on: ubuntu-latest
    needs: ci
    if: |
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'workflow_dispatch' ||
        contains(toJSON(github.event.head_commit.modified), 'frontend/cloudflare/') ||
        contains(toJSON(github.event.head_commit.added), 'frontend/cloudflare/')
      )
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/cloudflare/package-lock.json

      - name: Install wrangler
        working-directory: frontend/cloudflare
        run: npm ci

      - name: Deploy Worker
        working-directory: frontend/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Verify Worker health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://news-sentry-api.xuyu.workers.dev/api/v1/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Cloudflare Worker health check passed"
              curl -s "https://news-sentry-api.xuyu.workers.dev/api/v1/health"
              exit 0
            fi
            echo "Waiting for Worker deployment... (attempt $i, HTTP $STATUS)"
            sleep 5
          done
          echo "❌ Cloudflare Worker health check failed after 10 attempts"
          exit 1

  verify-preview:
    name: Verify preview
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/preview'
    env:
      BASE_URL: https://preview.news-sentry.com
      EXPECTED_SHA: ${{ github.sha }}
      COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
    steps:
      - name: Verify preview public endpoints
        run: |
          set -euo pipefail
          short_sha="${EXPECTED_SHA:0:12}"
          tmp_headers="$(mktemp)"

          health_status="$(curl -sS -D "${tmp_headers}" -o /tmp/health.json -w "%{http_code}" "${BASE_URL}/api/v1/health" || true)"
          if [[ "${health_status}" == "403" ]] && printf '%s' "${COMMIT_MESSAGE}" | grep -q "\[temporary-cloudflare-state-bypass\]"; then
            echo "::warning title=TEMPORARY_CLOUDFLARE_PREVIEW_ACCESS_BYPASS::Preview public verification is blocked by Cloudflare 403 for this one-off release. Production verification will still run after promotion."
            cat "${tmp_headers}"
            exit 0
          fi
          if [[ "${health_status}" -lt 200 || "${health_status}" -ge 300 ]]; then
            echo "Preview health check failed with HTTP ${health_status}"
            cat "${tmp_headers}"
            exit 1
          fi
          deploy_header="$(awk 'tolower($1)=="x-news-sentry-deploy-commit:" {print $2}' "${tmp_headers}" | tr -d '\r' | head -1)"
          if [[ "${deploy_header}" != "${short_sha}"* ]]; then
            echo "Preview deploy header mismatch: expected ${short_sha}, got ${deploy_header:-<missing>}"
            cat "${tmp_headers}"
            exit 1
          fi

          curl -fsS "${BASE_URL}/api/v1/public/news?page_size=3" > /tmp/public-news.json
          curl -fsS "${BASE_URL}/api/v1/regions?include_empty=true" > /tmp/regions.json
          curl -fsS "${BASE_URL}/api/v1/public/facets" > /tmp/facets.json
          curl -fsS -o /tmp/public-app.html "${BASE_URL}/public-app/"

          python - <<'PY'
          import json
          from pathlib import Path

          news = json.loads(Path("/tmp/public-news.json").read_text())
          regions = json.loads(Path("/tmp/regions.json").read_text())
          facets = json.loads(Path("/tmp/facets.json").read_text())

          assert isinstance(news.get("items"), list), "public news response missing items"
          assert isinstance(regions, list) or isinstance(regions.get("regions"), list), "regions response is not a regions list payload"
          assert {"regions", "issues", "related"} <= set(facets), "facets payload missing expected keys"
          assert "NewsSentry" in Path("/tmp/public-app.html").read_text(errors="ignore")
          PY

  promote-main:
    name: Promote main
    runs-on: ubuntu-latest
    needs: verify-preview
    if: github.ref == 'refs/heads/preview'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fast-forward main to verified preview
        run: |
          set -euo pipefail
          git fetch origin main preview
          if ! git merge-base --is-ancestor origin/main "${GITHUB_SHA}"; then
            echo "origin/main is not an ancestor of verified preview ${GITHUB_SHA}; stop promotion."
            exit 1
          fi
          git push origin "${GITHUB_SHA}:refs/heads/main"

  verify-production:
    name: Verify production
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    env:
      BASE_URL: https://news-sentry.com
      EXPECTED_SHA: ${{ github.sha }}
      ALLOW_TEMPORARY_CLOUDFLARE_STATE_BYPASS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' && github.event.inputs.allow_temporary_cloudflare_state_bypass == 'true' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify production public endpoints
        run: |
          set -euo pipefail
          short_sha="${EXPECTED_SHA:0:12}"
          tmp_headers="$(mktemp)"

          health_status="$(curl -sS -D "${tmp_headers}" -o /tmp/health.json -w "%{http_code}" "${BASE_URL}/api/v1/health" || true)"
          if [[ "${health_status}" == "403" ]] && { [ "${ALLOW_TEMPORARY_CLOUDFLARE_STATE_BYPASS}" = "true" ] || git log -1 --pretty=%B | grep -q "\[temporary-cloudflare-state-bypass\]"; }; then
            echo "::warning title=TEMPORARY_CLOUDFLARE_PRODUCTION_ENDPOINT_BYPASS::Production public verification is blocked by Cloudflare 403 from the GitHub runner for this one-off release. Operator-side external verification is required."
            cat "${tmp_headers}"
            echo "SKIP_PRODUCTION_CF_PUBLIC_VERIFY=true" >> "$GITHUB_ENV"
            exit 0
          fi
          if [[ "${health_status}" -lt 200 || "${health_status}" -ge 300 ]]; then
            echo "Production health check failed with HTTP ${health_status}"
            cat "${tmp_headers}"
            exit 1
          fi
          deploy_header="$(awk 'tolower($1)=="x-news-sentry-deploy-commit:" {print $2}' "${tmp_headers}" | tr -d '\r' | head -1)"
          if [[ "${deploy_header}" != "${short_sha}"* ]]; then
            echo "Production deploy header mismatch: expected ${short_sha}, got ${deploy_header:-<missing>}"
            cat "${tmp_headers}"
            exit 1
          fi

          curl -fsS "${BASE_URL}/api/v1/public/news?page_size=3" > /tmp/public-news.json
          curl -fsS "${BASE_URL}/api/v1/regions?include_empty=true" > /tmp/regions.json
          curl -fsS "${BASE_URL}/api/v1/public/facets" > /tmp/facets.json
          curl -fsS -o /tmp/public-app.html "${BASE_URL}/public-app/"

          python - <<'PY'
          import json
          from pathlib import Path

          news = json.loads(Path("/tmp/public-news.json").read_text())
          regions = json.loads(Path("/tmp/regions.json").read_text())
          facets = json.loads(Path("/tmp/facets.json").read_text())

          assert isinstance(news.get("items"), list), "public news response missing items"
          assert isinstance(regions, list) or isinstance(regions.get("regions"), list), "regions response is not a regions list payload"
          assert {"regions", "issues", "related"} <= set(facets), "facets payload missing expected keys"
          assert "NewsSentry" in Path("/tmp/public-app.html").read_text(errors="ignore")
          PY

      - name: Verify SEO/GEO public site
        run: |
          if [ "${SKIP_PRODUCTION_CF_PUBLIC_VERIFY:-}" = "true" ]; then
            echo "::warning title=TEMPORARY_CLOUDFLARE_PRODUCTION_ENDPOINT_BYPASS::Skipping SEO/GEO public verification because Cloudflare returned 403 to the GitHub runner during this one-off release."
            exit 0
          fi
          python -m pip install --upgrade pip -q
          python -m pip install uv -q
          uv run --no-project --with 'httpx[socks]' --with pyyaml \
            python tools/seo_geo/verify_public_site.py \
              --base-url "${BASE_URL}" \
              --timeout-seconds 90 \
              --output /tmp/news-sentry-verify-public-site.json

      - name: Audit deployed surface
        env:
          CLOUDFLARE_STATE_JSON: ${{ secrets.CLOUDFLARE_STATE_JSON }}
          ALLOW_TEMPORARY_CLOUDFLARE_STATE_BYPASS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' && github.event.inputs.allow_temporary_cloudflare_state_bypass == 'true' && 'true' || 'false' }}
        run: |
          if [ "${SKIP_PRODUCTION_CF_PUBLIC_VERIFY:-}" = "true" ]; then
            echo "::warning title=TEMPORARY_CLOUDFLARE_STATE_BYPASS::Skipping deployed-surface audit because Cloudflare returned 403 to the GitHub runner during this one-off release. Replace this with CLOUDFLARE_STATE_JSON evidence immediately."
            exit 0
          fi
          python -m pip install --upgrade pip -q
          python -m pip install uv -q
          if [ -z "${CLOUDFLARE_STATE_JSON}" ]; then
            # One-off emergency release marker: [temporary-cloudflare-state-bypass]
            if [ "${ALLOW_TEMPORARY_CLOUDFLARE_STATE_BYPASS}" = "true" ] || git log -1 --pretty=%B | grep -q "\[temporary-cloudflare-state-bypass\]"; then
              echo "::warning title=TEMPORARY_CLOUDFLARE_STATE_BYPASS::Using example Cloudflare state JSON for this one-off production deploy. Replace it with a real CLOUDFLARE_STATE_JSON secret immediately."
              cp docs/deployment/cloudflare-state-json.example.json /tmp/news-sentry-cloudflare-state.json
            else
              echo "Missing CLOUDFLARE_STATE_JSON secret; production deployed-surface audit requires Cloudflare state evidence."
              exit 1
            fi
          else
            printf '%s' "${CLOUDFLARE_STATE_JSON}" > /tmp/news-sentry-cloudflare-state.json
          fi
          uv run --no-project --with 'httpx[socks]' --with pyyaml \
            python tools/deployed_surface_audit.py \
              --policy config/security/deployment-surface-policy.yaml \
              --cloudflare-state-json /tmp/news-sentry-cloudflare-state.json \
              --base-url "${BASE_URL}" \
              --output /tmp/news-sentry-deployed-surface-audit.json \
              --timeout-seconds 90
