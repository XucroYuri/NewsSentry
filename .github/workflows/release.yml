name: Build & Publish

on:
  release:
    types: [published]

jobs:
  # ── PyPI 发布 ──────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 多平台桌面构建 ─────────────────────────────────────
  build-desktop:
    name: Build ${{ matrix.os-name }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - runner: macos-latest
            os-name: macos-arm64
            output: news-sentry
            asset-name: news-sentry-macos-arm64
          - runner: windows-latest
            os-name: windows-x64
            output: news-sentry.exe
            asset-name: news-sentry-windows-x64.exe
          - runner: ubuntu-latest
            os-name: linux-x64
            output: news-sentry
            asset-name: news-sentry-linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[api,proxy,desktop]"

      - name: Build with PyInstaller
        run: pyinstaller news-sentry.spec
        env:
          CI: "1"

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x dist/${{ matrix.output }}
          mv dist/${{ matrix.output }} dist/${{ matrix.asset-name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mv dist\${{ matrix.output }} dist\${{ matrix.asset-name }}
        shell: cmd

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset-name }}
