name: Scan Secrets

on:
  push:
    branches: [main, preview]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/check_publication_hygiene.py
      - run: python tools/scan_sensitive_data.py
