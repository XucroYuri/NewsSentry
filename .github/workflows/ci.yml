name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/public/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,proxy]"

      - name: Install public frontend dependencies
        working-directory: frontend/public
        run: npm ci

      - name: Public frontend lint
        working-directory: frontend/public
        run: npm run lint

      - name: Public frontend tests
        working-directory: frontend/public
        run: npm run test

      - name: Public frontend build
        working-directory: frontend/public
        run: npm run build

      - name: Lint (ruff)
        run: python -m ruff check

      - name: Type check (mypy)
        run: python -m mypy src/news_sentry/ --ignore-missing-imports

      - name: Test (pytest + coverage)
        timeout-minutes: 20
        run: python -m pytest tests/ -q --tb=short --timeout=300 --durations=25 --cov=src/news_sentry --cov-report=term-missing --cov-report=xml

      - name: Coverage summary
        if: always()
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = root.attrib.get('line-rate', '0')
          pct = float(rate) * 100
          print(f'## Coverage: {pct:.1f}%')
          " >> "$GITHUB_STEP_SUMMARY"

      - name: Publication hygiene scan
        run: python tools/check_publication_hygiene.py

      - name: Security scan (sensitive keywords)
        run: python tools/scan_sensitive_data.py

      - name: Hardcoded target scan
        run: python tools/check_no_hardcoded_target.py

      - name: Config schema validation
        run: python -m pytest tests/unit/test_config_schema_validation.py -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
