name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:  # 手动触发

# 注意: 日常部署走 deploy.yml（venv + systemd，不用 Docker）
# 本 workflow 仅用于构建正式 tag 的 Docker 镜像，推送到 GHCR 供其他场景使用

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xucroyuri/news-sentry

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      # ── Stage 1: Core 镜像（RSS/API + 研判 + API Server）──
      - name: Build core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.core
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-core
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:core

      # ── Stage 2: Browser 镜像（+ Playwright + OpenCLI）──
      - name: Build browser image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.browser
          push: true
          build-args: |
            CORE_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-core
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-browser
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:browser

      # ── Stage 3: Full 镜像（+ ffmpeg + yt-dlp + Hermes cron）──
      - name: Build full image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.full
          push: true
          build-args: |
            BROWSER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-browser
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-full
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Test core image
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}-core \
            python -m news_sentry.cli --help
