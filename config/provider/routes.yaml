# Schema: ../../schemas/providerconfig.schema.json
# 契约: docs/contracts-canonical.md §7
# ADR: ADR-0005
#
# AI Provider 路由配置 — Phase 5 多 Provider 路由
# 默认使用 OpenRouter（OpenAI-compatible API）。
# 需要设置:
#   OPENROUTER_API_KEY
# 可选覆盖:
#   OPENROUTER_BASE_URL=https://openrouter.ai/api/v1
#   OPENROUTER_DEFAULT_MODEL=qwen/qwen3.7-plus
routes_version: "1.1.0"

routes:

  # ── 翻译任务 ──────────────────────────────────────────

  - route_id: translate.fast
    task_type: translate
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 30
    max_cost_usd_per_call: 0.001
    output_schema_ref: null
    audit: false
    notes: "collect 阶段快速预翻译标题（metadata.translation.title_pre）"

  - route_id: translate.high
    task_type: translate
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 60
    max_cost_usd_per_call: 0.003
    output_schema_ref: null
    audit: true
    fallback_route_ids:
      - translate.fast
    notes: "judge 阶段高质量翻译（title_translated / content_translated）"

  - route_id: translate.batch
    task_type: translate
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 60
    max_cost_usd_per_call: 0.003
    output_schema_ref: null
    audit: true
    notes: "低频 AI 增强批处理：JSON 标题翻译"

  - route_id: cluster.brief
    task_type: cluster
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 60
    max_cost_usd_per_call: 0.003
    output_schema_ref: null
    audit: true
    notes: "低频 AI 增强批处理：聚类中文标签和摘要"

  - route_id: judge.review.batch
    task_type: judge_review
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 60
    max_cost_usd_per_call: 0.003
    output_schema_ref: null
    audit: true
    notes: "低频 AI 增强批处理：疑难事件复核建议"

  - route_id: ai.enrichment.batch
    task_type: ai_enrichment
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 90
    max_cost_usd_per_call: 0.005
    output_schema_ref: null
    audit: true
    notes: "低频 AI 增强合并路由：单次 JSON 同时处理翻译、聚类摘要和复核建议"

  # ── 判断任务 ──────────────────────────────────────────

  - route_id: judge.primary
    task_type: judge
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 60
    max_cost_usd_per_call: 0.003
    output_schema_ref: "schemas/toolrunresult.schema.json"
    audit: true
    fallback_route_ids:
      - judge.anthropic
    notes: "主研判路由：计算 news_value_score / china_relevance / recommendation"

  - route_id: judge.anthropic
    task_type: judge
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 60
    max_cost_usd_per_call: 0.003
    output_schema_ref: "schemas/toolrunresult.schema.json"
    audit: true
    notes: "研判备用路由：历史 route_id 保留；默认同样走 OpenRouter"

  # ── 分类任务 ──────────────────────────────────────────

  - route_id: classify.primary
    task_type: classify
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 30
    max_cost_usd_per_call: 0.001
    output_schema_ref: "schemas/classification.schema.json"
    audit: true
    fallback_route_ids:
      - fallback.local
    notes: "LLM 分类路由（L0–L3），失败回退到规则引擎"

  # ── NLP 分析任务 ──────────────────────────────────────────

  - route_id: nlp.ai-fast
    task_type: nlp
    provider: openrouter
    model: qwen/qwen3.7-plus
    timeout_seconds: 30
    max_cost_usd_per_call: 0.001
    output_schema_ref: null
    audit: false
    notes: "NLP 深度分析路由：情感/实体/关联/摘要增强"

  # ── 本地回退路由 ──────────────────────────────────────

  - route_id: fallback.local
    task_type: judge
    provider: local
    model: rules-engine
    timeout_seconds: 120
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: false
    notes: "最终回退：本地规则引擎，无 API 依赖，输出质量较低"

# 所有路由失败时的最终回退
fallback_route_id: fallback.local
