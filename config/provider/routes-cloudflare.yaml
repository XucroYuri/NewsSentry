# Schema: ../../schemas/providerconfig.schema.json
# 契约: docs/contracts-canonical.md §7
# ADR: ADR-0005
#
# Cloudflare 部署变体 — 内置多 Provider 链式兜底版。
# 与 main routes.yaml 保持一致的 fallback 链：
# gemini → deepseek → groq → cloudflare_workers_ai → local
#
routes_version: "2.3.0"

routes:

  - route_id: translate.fast
    task_type: translate
    provider: gemini
    model: gemini-2.0-flash
    timeout_seconds: 45
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: false
    fallback_route_ids:
      - translate.fast.deepseek
      - translate.fast.groq
    notes: "快速翻译 — gemini → deepseek → groq"

  - route_id: translate.fast.deepseek
    task_type: translate
    provider: deepseek
    model: deepseek-chat
    timeout_seconds: 45
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: false
    fallback_route_ids:
      - translate.fast.groq

  - route_id: translate.fast.groq
    task_type: translate
    provider: groq
    model: llama-3.3-70b-versatile
    timeout_seconds: 45
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: false
    fallback_route_ids:
      - fallback.local

  - route_id: translate.high
    task_type: translate
    provider: gemini
    model: gemini-2.0-flash
    timeout_seconds: 90
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: true
    fallback_route_ids:
      - translate.high.deepseek
      - translate.high.groq

  - route_id: translate.high.deepseek
    task_type: translate
    provider: deepseek
    model: deepseek-chat
    timeout_seconds: 90
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: true
    fallback_route_ids:
      - translate.high.groq

  - route_id: translate.high.groq
    task_type: translate
    provider: groq
    model: llama-3.3-70b-versatile
    timeout_seconds: 90
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: true
    fallback_route_ids:
      - fallback.local

  - route_id: judge.primary
    task_type: judge
    provider: gemini
    model: gemini-2.0-flash
    timeout_seconds: 90
    max_cost_usd_per_call: 0.0
    output_schema_ref: "schemas/toolrunresult.schema.json"
    audit: true
    fallback_route_ids:
      - judge.primary.deepseek
      - judge.primary.groq

  - route_id: judge.primary.deepseek
    task_type: judge
    provider: deepseek
    model: deepseek-chat
    timeout_seconds: 90
    max_cost_usd_per_call: 0.0
    output_schema_ref: "schemas/toolrunresult.schema.json"
    audit: true
    fallback_route_ids:
      - judge.primary.groq

  - route_id: judge.primary.groq
    task_type: judge
    provider: groq
    model: llama-3.3-70b-versatile
    timeout_seconds: 90
    max_cost_usd_per_call: 0.0
    output_schema_ref: "schemas/toolrunresult.schema.json"
    audit: true
    fallback_route_ids:
      - fallback.local

  - route_id: judge.anthropic
    task_type: judge
    provider: gemini
    model: gemini-2.0-flash
    timeout_seconds: 90
    max_cost_usd_per_call: 0.0
    output_schema_ref: "schemas/toolrunresult.schema.json"
    audit: true
    fallback_route_ids:
      - judge.primary.deepseek
      - judge.primary.groq
    notes: "历史 route_id 兼容，指向 Gemini → deepseek → groq"

  - route_id: classify.primary
    task_type: classify
    provider: gemini
    model: gemini-2.0-flash
    timeout_seconds: 60
    max_cost_usd_per_call: 0.0
    output_schema_ref: "schemas/classification.schema.json"
    audit: true
    fallback_route_ids:
      - classify.primary.deepseek
      - classify.primary.groq

  - route_id: classify.primary.deepseek
    task_type: classify
    provider: deepseek
    model: deepseek-chat
    timeout_seconds: 60
    max_cost_usd_per_call: 0.0
    output_schema_ref: "schemas/classification.schema.json"
    audit: true
    fallback_route_ids:
      - classify.primary.groq

  - route_id: classify.primary.groq
    task_type: classify
    provider: groq
    model: llama-3.3-70b-versatile
    timeout_seconds: 60
    max_cost_usd_per_call: 0.0
    output_schema_ref: "schemas/classification.schema.json"
    audit: true
    fallback_route_ids:
      - fallback.local

  - route_id: nlp.ai-fast
    task_type: nlp
    provider: gemini
    model: gemini-2.0-flash
    timeout_seconds: 60
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: false
    fallback_route_ids:
      - nlp.ai-fast.deepseek
      - nlp.ai-fast.groq

  - route_id: nlp.ai-fast.deepseek
    task_type: nlp
    provider: deepseek
    model: deepseek-chat
    timeout_seconds: 60
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: false
    fallback_route_ids:
      - nlp.ai-fast.groq

  - route_id: nlp.ai-fast.groq
    task_type: nlp
    provider: groq
    model: llama-3.3-70b-versatile
    timeout_seconds: 60
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: false
    fallback_route_ids:
      - fallback.local

  - route_id: fallback.local
    task_type: judge
    provider: local
    model: rules-engine
    timeout_seconds: 120
    max_cost_usd_per_call: 0.0
    output_schema_ref: null
    audit: false
    notes: "最终回退：本地规则引擎，无 API 依赖"

fallback_route_id: fallback.local
