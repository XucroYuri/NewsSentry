# Schema: ../../schemas/filterrules.schema.json
# 契约: docs/contracts-canonical.md §3
# ADR: ADR-0009
rules_version: "1.0.0"
target_id: china-watch-en

# 进入 evaluated/ 阶段所需的最低 news_value_score（0-100）
score_threshold: 30

# 超过此时间窗口的事件直接归档，不进入 judge 阶段
max_age_hours: 48

# 去重时间窗口：同 URL 或同 id 在此窗口内只保留一条
dedup_window_hours: 24

# 关键词规则：weight 为增益因子（与基础分相乘），language 指明关键词所属语言
keyword_rules:

  # ── Broad China Signal / 基础涉华识别 ─────────────────
  - keyword: "China"
    weight: 0.70
    language: en
  - keyword: "Chinese"
    weight: 0.70
    language: en
  - keyword: "Taiwan"
    weight: 0.85
    language: en
  - keyword: "Hong Kong"
    weight: 0.85
    language: en
  - keyword: "Macau"
    weight: 0.70
    language: en
  - keyword: "Tibet"
    weight: 0.80
    language: en
  - keyword: "Xinjiang"
    weight: 0.90
    language: en

  # ── China Diplomacy / 中国外交 ───────────────────────
