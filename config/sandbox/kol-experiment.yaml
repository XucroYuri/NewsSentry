# Schema: ../../schemas/sandboxpolicy.schema.json
# 契约: docs/contracts-canonical.md §6
# ADR: ADR-0003
#
# KOL Experiment 沙箱策略：严格 KOL 实验环境
# 仅允许 OpenCLI + 受限浏览器 profile，最大化安全隔离
profile_id: kol-experiment
default_action: deny

command_policy:
  allowed_commands:
    - opencli
  # 阻断所有危险操作模式
  blocked_patterns:
    - "rm -rf"
    - "sudo"
    - "chmod"
    - "dd if="
    - "> /dev/"
    - "mkfs"
    - "mount "

filesystem_policy:
  read_roots:
    - "./config/"
    - "./schemas/"
  write_roots:
    - "./data/raw/kol/"
    - "./data/memory/"
    - "./data/logs/"

network_policy:
  # 仅允许社交媒体/KOL 平台
  allowed_hosts:
    - "twitter.com"
    - "x.com"
    - "www.zhihu.com"
    - "zhihu.com"
    - "mp.weixin.qq.com"
    - "api.zhihu.com"
  blocked_hosts:
    - "169.254.169.254"
    - "metadata.google.internal"

browser_policy:
  # 仅允许实验用的公共 profile（无登录凭据）
  session_profiles_allowed:
    - "twitter-italia-public"
    - "zhihu-public"

budget_policy:
  max_run_duration_seconds: 1800   # KOL 实验限制 30 分钟
  max_events_per_run: 100
  max_ai_calls_per_run: 0          # 禁用 AI 调用，纯采集实验

audit:
  log_all_tool_calls: true
  log_path: "./data/logs/"
