# Schema: ../../schemas/toolmanifest.schema.json
# 契约: docs/contracts-canonical.md §5
# ADR: ADR-0011, ADR-0008
#
# ToolManifest 骨架：12 条 OpenCLI 命令封装
# 所有工具调用须经 sandbox_profile 沙箱决策后执行
# 详见 docs/brainstorming/ToolManifest与工具适配层规格.md

tools:

  # ── 网络采集类 ────────────────────────────────────────

  - tool_id: opencli.fetch
    display_name: "OpenCLI Fetch URL"
    version: "1.0.0"
    execution_type: subprocess
    command_template: "opencli fetch --url {url} --output {output_path}"
    parameters_schema:
      type: object
      required: [url, output_path]
      properties:
        url: { type: string, format: uri }
        output_path: { type: string }
    exit_codes:
      "0": success
      "1": fetch_failed
      "2": timeout
      "3": permission_denied
    permissions:
      risk_level: medium
      network:
        allowed_hosts: ["*"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []

  - tool_id: opencli.search
    display_name: "OpenCLI Web Search"
    version: "1.0.0"
    execution_type: subprocess
    command_template: "opencli search --query {query} --limit {limit} --output {output_path}"
    parameters_schema:
      type: object
      required: [query, output_path]
      properties:
        query: { type: string }
        limit: { type: integer, default: 10, minimum: 1, maximum: 50 }
        output_path: { type: string }
    exit_codes:
      "0": success
      "1": search_failed
      "2": timeout
      "3": permission_denied
    permissions:
      risk_level: medium
      network:
        allowed_hosts: ["*"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []

  - tool_id: opencli.extract
    display_name: "OpenCLI Extract Structured Data"
    version: "1.0.0"
    execution_type: subprocess
    # 从已下载的 HTML/文本文件中提取结构化字段
    command_template: "opencli extract --input {input_path} --schema {schema_path} --output {output_path}"
    parameters_schema:
      type: object
      required: [input_path, output_path]
      properties:
        input_path: { type: string }
        schema_path: { type: string }
        output_path: { type: string }
    exit_codes:
      "0": success
      "1": parse_failed
      "2": schema_mismatch
    permissions:
      risk_level: low
      network:
        allowed_hosts: []
      filesystem:
        read_roots: ["./data/{target_id}/raw/", "./schemas/"]
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []

  # ── 浏览器自动化类（需 session_profile） ──────────────

  - tool_id: opencli.screenshot
    display_name: "OpenCLI Take Screenshot"
    version: "1.0.0"
    execution_type: subprocess
    command_template: "opencli screenshot --url {url} --output {output_path}"
    parameters_schema:
      type: object
      required: [url, output_path]
      properties:
        url: { type: string, format: uri }
        output_path: { type: string }
    exit_codes:
      "0": success
      "1": render_failed
      "2": timeout
    permissions:
      risk_level: high              # 浏览器渲染需较高权限
      network:
        allowed_hosts: ["*"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: true
      credentials:
        required: []

  - tool_id: opencli.wait
    display_name: "OpenCLI Wait for Condition"
    version: "1.0.0"
    execution_type: subprocess
    # 等待页面元素或网络条件满足后继续
    command_template: "opencli wait --selector {selector} --timeout {timeout_seconds}"
    parameters_schema:
      type: object
      required: [selector]
      properties:
        selector: { type: string }
        timeout_seconds: { type: integer, default: 10, maximum: 60 }
    exit_codes:
      "0": condition_met
      "1": timeout
      "2": element_not_found
    permissions:
      risk_level: medium
      network:
        allowed_hosts: []
      filesystem:
        read_roots: []
        write_roots: []
      browser:
        session_profile_required: true
      credentials:
        required: []

  - tool_id: opencli.click
    display_name: "OpenCLI Click Element"
    version: "1.0.0"
    execution_type: subprocess
    command_template: "opencli click --selector {selector}"
    parameters_schema:
      type: object
      required: [selector]
      properties:
        selector: { type: string }
    exit_codes:
      "0": success
      "1": element_not_found
      "2": click_intercepted
    permissions:
      risk_level: high
      network:
        allowed_hosts: ["*"]
      filesystem:
        read_roots: []
        write_roots: []
      browser:
        session_profile_required: true
      credentials:
        required: []

  - tool_id: opencli.type
    display_name: "OpenCLI Type Text"
    version: "1.0.0"
    execution_type: subprocess
    command_template: "opencli type --selector {selector} --text {text}"
    parameters_schema:
      type: object
      required: [selector, text]
      properties:
        selector: { type: string }
        text: { type: string }
    exit_codes:
      "0": success
      "1": element_not_found
    permissions:
      risk_level: high
      network:
        allowed_hosts: ["*"]
      filesystem:
        read_roots: []
        write_roots: []
      browser:
        session_profile_required: true
      credentials:
        required: []

  - tool_id: opencli.navigate
    display_name: "OpenCLI Navigate to URL"
    version: "1.0.0"
    execution_type: subprocess
    command_template: "opencli navigate --url {url}"
    parameters_schema:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
    exit_codes:
      "0": success
      "1": navigation_failed
      "2": timeout
    permissions:
      risk_level: medium
      network:
        allowed_hosts: ["*"]
      filesystem:
        read_roots: []
        write_roots: []
      browser:
        session_profile_required: true
      credentials:
        required: []

  - tool_id: opencli.scroll
    display_name: "OpenCLI Scroll Page"
    version: "1.0.0"
    execution_type: subprocess
    command_template: "opencli scroll --direction {direction} --amount {amount}"
    parameters_schema:
      type: object
      required: [direction]
      properties:
        direction:
          type: string
          enum: [up, down, left, right]
        amount: { type: integer, default: 300, minimum: 0 }
    exit_codes:
      "0": success
      "1": scroll_failed
    permissions:
      risk_level: low
      network:
        allowed_hosts: []
      filesystem:
        read_roots: []
        write_roots: []
      browser:
        session_profile_required: true
      credentials:
        required: []

  # ── 数据提取类 ────────────────────────────────────────

  - tool_id: opencli.get_text
    display_name: "OpenCLI Get Element Text"
    version: "1.0.0"
    execution_type: subprocess
    command_template: "opencli get_text --selector {selector} --output {output_path}"
    parameters_schema:
      type: object
      required: [selector, output_path]
      properties:
        selector: { type: string }
        output_path: { type: string }
    exit_codes:
      "0": success
      "1": element_not_found
    permissions:
      risk_level: low
      network:
        allowed_hosts: []
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: true
      credentials:
        required: []

  - tool_id: opencli.list_links
    display_name: "OpenCLI List Page Links"
    version: "1.0.0"
    execution_type: subprocess
    command_template: "opencli list_links --filter {filter_pattern} --output {output_path}"
    parameters_schema:
      type: object
      required: [output_path]
      properties:
        filter_pattern: { type: string, default: "*" }
        output_path: { type: string }
    exit_codes:
      "0": success
      "1": page_not_loaded
    permissions:
      risk_level: low
      network:
        allowed_hosts: []
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: true
      credentials:
        required: []

  - tool_id: opencli.submit_form
    display_name: "OpenCLI Submit Form"
    version: "1.0.0"
    execution_type: subprocess
    # 仅用于无需登录凭据的公开搜索表单；禁止用于含账号/密码的登录表单
    command_template: "opencli submit_form --selector {selector}"
    parameters_schema:
      type: object
      required: [selector]
      properties:
        selector: { type: string }
    exit_codes:
      "0": success
      "1": form_not_found
      "2": submission_failed
    permissions:
      risk_level: high              # 表单提交有副作用，需显式审批
      network:
        allowed_hosts: ["*"]
      filesystem:
        read_roots: []
        write_roots: []
      browser:
        session_profile_required: true
      credentials:
        required: []               # 严禁注入凭据，见 ADR-0003

  # ═══════════════════════════════════════════════════════
  # ADR-0011 内容源工具（12 条，Phase 4 / Phase 6）
  # ═══════════════════════════════════════════════════════

  # ── Hacker News ──────────────────────────────────────

  - tool_id: opencli.hackernews.top
    display_name: "Hacker News 热榜"
    version: "1.0.0"
    phase: "Phase 4"
    execution_type: subprocess
    executable: opencli
    argv_template: ["hackernews", "top", "--limit", "{n}", "-f", "json"]
    command_template: "opencli hackernews top --limit {n} -f json"
    parameters_schema:
      type: object
      required: []
      properties:
        n:
          type: integer
          default: 30
          minimum: 1
          maximum: 100
    output_schema: { items: [{ id, title, url, score, comments }] }
    permissions:
      risk_level: low
      network:
        allowed_hosts: ["news.ycombinator.com"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []
    rate_limit:
      max_calls_per_hour: 12
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      1: tool_error

  - tool_id: opencli.hackernews.search
    display_name: "Hacker News 搜索"
    version: "1.0.0"
    phase: "Phase 4"
    execution_type: subprocess
    executable: opencli
    argv_template: ["hackernews", "search", "{q}", "--limit", "{n}", "-f", "json"]
    command_template: "opencli hackernews search {q} --limit {n} -f json"
    parameters_schema:
      type: object
      required: [q]
      properties:
        q:
          type: string
        n:
          type: integer
          default: 20
          minimum: 1
    permissions:
      risk_level: low
      network:
        allowed_hosts: ["news.ycombinator.com", "hn.algolia.com"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []
    rate_limit:
      max_calls_per_hour: 20
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      1: tool_error
      2: args_invalid

  # ── Reddit ──────────────────────────────────────────

  - tool_id: opencli.reddit.hot
    display_name: "Reddit 热帖"
    version: "1.0.0"
    phase: "Phase 4"
    execution_type: subprocess
    executable: opencli
    argv_template: ["reddit", "hot", "--subreddit", "{r}", "--limit", "{n}", "-f", "json"]
    command_template: "opencli reddit hot --subreddit {r} --limit {n} -f json"
    parameters_schema:
      type: object
      required: [r]
      properties:
        r:
          type: string
          examples: ["italy", "europe", "geopolitics", "worldnews"]
        n:
          type: integer
          default: 25
          minimum: 1
    permissions:
      risk_level: low
      network:
        allowed_hosts: ["reddit.com", "www.reddit.com", "oauth.reddit.com"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []
    rate_limit:
      max_calls_per_hour: 12
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      1: tool_error
      2: args_invalid

  - tool_id: opencli.reddit.search
    display_name: "Reddit 搜索"
    version: "1.0.0"
    phase: "Phase 4"
    execution_type: subprocess
    executable: opencli
    argv_template: ["reddit", "search", "{q}", "--limit", "{n}", "-f", "json"]
    command_template: "opencli reddit search {q} --limit {n} -f json"
    parameters_schema:
      type: object
      required: [q]
      properties:
        q:
          type: string
        n:
          type: integer
          default: 20
          minimum: 1
    permissions:
      risk_level: low
      network:
        allowed_hosts: ["reddit.com", "www.reddit.com", "oauth.reddit.com"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []
    rate_limit:
      max_calls_per_hour: 15
    exit_code_mapping:
      66: result_empty
      1: tool_error
      2: args_invalid

  # ── Google Scholar ──────────────────────────────────

  - tool_id: opencli.google-scholar.search
    display_name: "Google Scholar 学术搜索"
    version: "1.0.0"
    phase: "Phase 4"
    execution_type: subprocess
    executable: opencli
    argv_template: ["google-scholar", "search", "{q}", "--limit", "{n}", "-f", "json"]
    command_template: "opencli google-scholar search {q} --limit {n} -f json"
    parameters_schema:
      type: object
      required: [q]
      properties:
        q:
          type: string
        n:
          type: integer
          default: 10
          minimum: 1
    permissions:
      risk_level: low
      network:
        allowed_hosts: ["scholar.google.com"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []
    rate_limit:
      max_calls_per_hour: 6
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      1: tool_error
      2: args_invalid

  # ── Gov Policy (意大利政府) ────────────────────────

  - tool_id: opencli.gov-policy.search
    display_name: "意大利政府政策公告搜索"
    version: "1.0.0"
    phase: "Phase 4"
    execution_type: subprocess
    executable: opencli
    argv_template: ["gov-policy", "search", "{q}", "--country", "it", "-f", "json"]
    command_template: "opencli gov-policy search {q} --country it -f json"
    parameters_schema:
      type: object
      required: [q]
      properties:
        q:
          type: string
    permissions:
      risk_level: low
      network:
        allowed_hosts: ["www.governo.it", "www.parlamento.it", "eur-lex.europa.eu"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []
    rate_limit:
      max_calls_per_hour: 10
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      1: tool_error

  - tool_id: opencli.gov-policy.recent
    display_name: "意大利政府近期政策动态"
    version: "1.0.0"
    phase: "Phase 4"
    execution_type: subprocess
    executable: opencli
    argv_template: ["gov-policy", "recent", "--country", "it", "--days", "{days}", "-f", "json"]
    command_template: "opencli gov-policy recent --country it --days {days} -f json"
    parameters_schema:
      type: object
      required: []
      properties:
        days:
          type: integer
          default: 7
          minimum: 1
          maximum: 30
    permissions:
      risk_level: low
      network:
        allowed_hosts: ["www.governo.it", "www.parlamento.it"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []
    rate_limit:
      max_calls_per_hour: 8
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      1: tool_error

  # ── 知乎 ─────────────────────────────────────────────

  - tool_id: opencli.zhihu.hot
    display_name: "知乎热榜（中文涉华视角）"
    version: "1.0.0"
    phase: "Phase 4"
    execution_type: subprocess
    executable: opencli
    argv_template: ["zhihu", "hot", "--limit", "{n}", "-f", "json"]
    command_template: "opencli zhihu hot --limit {n} -f json"
    parameters_schema:
      type: object
      required: []
      properties:
        n:
          type: integer
          default: 20
          minimum: 1
    permissions:
      risk_level: low
      network:
        allowed_hosts: ["www.zhihu.com", "api.zhihu.com"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []
    rate_limit:
      max_calls_per_hour: 6
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      1: tool_error
    notes: "用于观察中文视角的意大利/欧洲舆论，支持 china_relevance 分析"

  # ── 外部自定义工具 ──────────────────────────────────

  - tool_id: opencli.external.custom
    display_name: "自定义外部工具包装"
    version: "1.0.0"
    phase: "Phase 4"
    execution_type: subprocess
    executable: opencli
    argv_template: ["external", "{name}", "{args}"]
    command_template: "opencli external {name} {args}"
    parameters_schema:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: "外部工具名称，需在 config/external-tools/ 中注册"
        args:
          type: string
          default: ""
    permissions:
      risk_level: medium
      network:
        allowed_hosts: []  # 由具体工具注册时指定
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: false
      credentials:
        required: []
    rate_limit:
      max_calls_per_hour: 20
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      77: auth_required
      1: tool_error
      2: args_invalid
    notes: "用于包装 News Sentry 内部自定义脚本，需要在单独注册文件中声明网络许可"

  # ═══════════════════════════════════════════════════════
  # Phase 6 社媒工具（需 session_profile 登录态）
  # ═══════════════════════════════════════════════════════

  # ── Twitter ──────────────────────────────────────────

  - tool_id: opencli.twitter.trending
    display_name: "Twitter 趋势话题"
    version: "1.0.0"
    phase: "Phase 6"
    execution_type: subprocess
    executable: opencli
    argv_template: ["twitter", "trending", "--locale", "{locale}", "-f", "json"]
    command_template: "opencli twitter trending --locale {locale} -f json"
    parameters_schema:
      type: object
      required: []
      properties:
        locale:
          type: string
          default: "it"
          enum: ["it", "en", "zh"]
    permissions:
      risk_level: medium
      network:
        allowed_hosts: ["twitter.com", "x.com", "api.twitter.com"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: true
      credentials:
        required: ["TWITTER_SESSION_PROFILE"]
    rate_limit:
      max_calls_per_hour: 4
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      77: auth_required
      1: tool_error
    notes: "需要提前配置 Chrome profile 登录态，退出码 77 触发 sandbox violation"

  - tool_id: opencli.twitter.search
    display_name: "Twitter 关键词搜索"
    version: "1.0.0"
    phase: "Phase 6"
    execution_type: subprocess
    executable: opencli
    argv_template: ["twitter", "search", "{q}", "--limit", "{n}", "-f", "json"]
    command_template: "opencli twitter search {q} --limit {n} -f json"
    parameters_schema:
      type: object
      required: [q]
      properties:
        q:
          type: string
        n:
          type: integer
          default: 20
          minimum: 1
    permissions:
      risk_level: medium
      network:
        allowed_hosts: ["twitter.com", "x.com", "api.twitter.com"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: true
      credentials:
        required: ["TWITTER_SESSION_PROFILE"]
    rate_limit:
      max_calls_per_hour: 10
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      77: auth_required
      1: tool_error
      2: args_invalid

  # ── 微信公众号 ──────────────────────────────────────

  - tool_id: opencli.weixin.search
    display_name: "微信公众号搜索"
    version: "1.0.0"
    phase: "Phase 6"
    execution_type: subprocess
    executable: opencli
    argv_template: ["weixin", "search", "{q}", "--limit", "{n}", "-f", "json"]
    command_template: "opencli weixin search {q} --limit {n} -f json"
    parameters_schema:
      type: object
      required: [q]
      properties:
        q:
          type: string
        n:
          type: integer
          default: 10
          minimum: 1
    permissions:
      risk_level: high
      network:
        allowed_hosts: ["mp.weixin.qq.com", "weixin.qq.com"]
      filesystem:
        read_roots: []
        write_roots: ["./data/{target_id}/raw/"]
      browser:
        session_profile_required: true
      credentials:
        required: ["WEIXIN_SESSION_PROFILE"]
    rate_limit:
      max_calls_per_hour: 3
    exit_code_mapping:
      66: result_empty
      69: browser_unavailable
      77: auth_required
      1: tool_error
    notes: "需要微信登录态，高风险；Phase 6 社媒实验通道"
