# News Sentry 日志轮转配置
#
# 安装前将 %DATA_DIR% 替换为实际数据目录路径：
#   sed 's|%DATA_DIR%|/app/data|g' config/logrotate.conf | sudo tee /etc/logrotate.d/news-sentry
#
# 默认数据目录: /app/data（Docker 容器内）或 ./data（本地开发）
# 测试: logrotate -d /etc/logrotate.d/news-sentry

%DATA_DIR%/*/logs/run-*.json {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

%DATA_DIR%/*/logs/health/health-*.jsonl {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

%DATA_DIR%/*/logs/audit-*.jsonl {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
