# News Sentry 日志轮转配置
# 安装: sudo cp config/logrotate.conf /etc/logrotate.d/news-sentry
# 测试: logrotate -d config/logrotate.conf
#
# 轮转 data/*/logs/ 下的运行日志

/path/to/data/*/logs/run-*.json {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}

/path/to/data/*/logs/health/health-*.jsonl {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
