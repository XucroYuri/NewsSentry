# Schema: ../../schemas/deploymentprofile.schema.json
# 契约: docs/spec/phase-2-runtime-carrier-alignment.md §3
profile_id: cloudflare
description: "Cloudflare-native Container profile for Worker scheduled collection and translation"

paths:
  cwd: "."
  output_root: "./data"
  config_root: "./config"
  log_root: "./data/{target_id}/logs"
  memory_root: "./data/{target_id}/memory"

network:
  allow_outbound: true
  blocked_hosts:
    - "169.254.169.254"
    - "metadata.google.internal"
    - "169.254.170.2"

runtime:
  trigger: scheduled
  max_duration_seconds: 1800
  max_memory_mb: 1024

sandbox:
  profile: cloud-vps
