# Schema: ../../schemas/classification.schema.json
# 契约: docs/contracts-canonical.md §9
# ADR: ADR-0009
extends: rules-v1.yaml
rules_version: "1.0.0"

# 法国特有 L1 子议题
l1_topics:
  - code: china_france_bilateral
    l0_domain: international-relations
    label_zh: "中法双边关系"
    label_fr: "Relations sino-françaises"
    keywords_fr: [Chine, Pékin, Xi Jinping, bilatéral, relations]
    keywords_en: [China, France-China, bilateral, Beijing]

  - code: french_indopacific
    l0_domain: public-safety
    label_zh: "印太战略"
    label_fr: "Indopacifique"
    keywords_fr: [Indopacifique, Nouvelle-Calédonie, Polynésie, base navale]
    keywords_en: [Indo-Pacific, New Caledonia, Polynesia, naval base]

  - code: china_trade_france
    l0_domain: economy
    label_zh: "中法贸易"
    label_fr: "Commerce franco-chinois"
    keywords_fr: [commerce, Chine, exportation, importation, douanes, Cognac]
    keywords_en: [trade, China, exports, tariffs, Cognac, luxury]

  - code: french_defense
    l0_domain: public-safety
    label_zh: "法国防务"
    label_fr: "Défense française"
    keywords_fr: [armée, défense, militaire, nucléaire, OTAN]
    keywords_en: [army, defense, military, nuclear, NATO]

  - code: french_immigration
    l0_domain: society
    label_zh: "法国移民"
    label_fr: "Immigration"
    keywords_fr: [immigration, migration, réfugiés, intégration, asile]
    keywords_en: [immigration, migration, refugees, integration, asylum]

  - code: french_energy
    l0_domain: environment
    label_zh: "法国能源"
    label_fr: "Énergie"
    keywords_fr: [nucléaire, énergie, EDF, renouvelable, transition énergétique]
    keywords_en: [nuclear, energy, EDF, renewable, energy transition]

# 法国特有 country_axes
country_axes:
  china_france_relations:
    enabled: true
    sub_axes: [china_france_bilateral, china_trade_france]
