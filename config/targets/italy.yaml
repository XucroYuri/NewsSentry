# Schema: ../../schemas/targetconfig.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015, ADR-0016
target_id: italy
display_name: "意大利新闻监控"
monitoring_type: country

language_scope:
  primary: it
  secondary: [en]
  output: zh

timezone: Europe/Rome

# 引用的源渠道 ID，对应 config/sources/italy/{id}.yaml
source_channel_refs:
  # ── 已有 RSS（11 个；失效源保留在 sources/ 中归档，不进入 active refs）────────────
  - ansa
  - repubblica
  - corriere
  - agi
  - tgcom24
  - lastampa
  - ilfattoquotidiano
  - ansa-en
  - ilmessaggero
  - rainews
  - ilsole24ore

  # ── 新增 RSS — A.政治与治理 ──────────────────────
  - adnkronos
  - camera-it
  - senato-it
  - quirinale
  - interno-gov

  # ── 新增 RSS — B.经济与商业 ──────────────────────
  - bancaditalia
  - eni-group

  # ── 新增 RSS — C.外交与国际关系 ──────────────────
  - farnesina

  # ── 新增 RSS — D.安全与防务 ──────────────────────
  - difesa-it
  - polizia-stato
  - carabinieri

  # ── 新增 RSS — E.司法与法治 ──────────────────────
  - anac

  # ── 新增 RSS — F.社会与民生 ──────────────────────
  - ilsecoloxix
  - ilmattino
  - salute-gov
  - miur

  # ── 新增 RSS — G.科技与数字 ──────────────────────
  - agid
  - garante-privacy
  - wired-it
  - startupitalia

  # ── 新增 RSS — H.环境与能源 ──────────────────────
  - enea
  - ispra
  - legambiente

  # ── 新增 RSS — I.移民与人口 ──────────────────────
  - unhcr-italia
  - iom-italy
  - open-migration

  # ── 新增 RSS — J.文化与遗产 ──────────────────────
  - mic
  - unesco-it
  - ansa-cultura

  # ── 新增 RSS — K.宗教与梵蒂冈 ────────────────────
  - vatican-news
  - cei
  - aci-stampa

  # ── API 信源 ─────────────────────────────────────
  - api/gnews-italy
  - api/newsapi-it
  - api/gdelt-italy
  - api/istat

  # ── OpenCLI 信源 ─────────────────────────────────
  - opencli/governo-it
  - opencli/parlamento-it
  - opencli/openpolis
  - opencli/corte-costituzionale
  - opencli/fondazione-italia-cina

  # ── 社媒信源（社媒采集独立管理，此处注册维度入口）──
  - social/twitter/A-politics-governance
  - social/twitter/B-economy-business
  - social/twitter/C-diplomacy-intl
  - social/twitter/D-security-defense
  - social/twitter/E-justice-law
  - social/twitter/F-society-livelihood
  - social/twitter/G-tech-digital
  - social/twitter/H-environment-energy
  - social/twitter/I-immigration-demographics
  - social/twitter/J-culture-heritage
  - social/twitter/K-religion-vatican
  - social/twitter/L-china-relations
  - social/twitter/L-china-topics
  - social/twitter/M-other-open

# 各子系统规则/路由配置的相对路径（相对于项目根目录）
filter_rules_ref: config/filters/italy/default.yaml
classification_rules_ref: config/classification/rules-italy.yaml
sandbox_profile_ref: config/sandbox/default.yaml
provider_routes_ref: config/provider/routes.yaml
output_destinations_ref: config/output/destinations.yaml

# 意大利子轴开关，控制 classification 阶段哪些 country_axes 参与打分
# 详见 docs/news-classification-framework.md 和 docs/contracts-canonical.md §9
classification:
  country_axes:
    politics: true
    economics: true
    crime: true
    sports: false
    culture: true
    eu_relations: true
    china_italy_relations: true
    immigration: true
    energy: true
    judicial: true
  # 本国相关性关键词：命中越多 home_relevance 越高（每词+10，上限100）
  home_relevance_keywords:
    - "cina"
    - "china"
    - "cinese"
    - "chinese"
    - "via della seta"
    - "belt and road"
    - "pechino"
    - "beijing"
    - "shanghai"
    - "xi jinping"
    - "brics"

# 驻意记者站重点监测领域 — 中国视角优先级
focus_areas:
  - id: china-italy-relations
    weight: 2.0
    keywords: [cina, cinese, china, xi jinping, belt and road, via della seta]
  - id: diplomacy
    weight: 1.5
    keywords: [diplomazia, ambasciata, trattato, summit, g7, g20]
  - id: economy-trade
    weight: 1.5
    keywords: [export, import, commercio, dogana, bilaterale]
