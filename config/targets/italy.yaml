# Schema: ../../schemas/targetconfig.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015, ADR-0016, ADR-0021
target_id: italy
display_name: "意大利新闻监控"

language_scope:
  primary: it
  secondary: [en]
  output: zh

timezone: Europe/Rome

# 引用的源渠道 ID，对应 config/sources/italy/{id}.yaml
# Phase 12: 14→64 信源，覆盖 13 维 × 3 种采集方式 (RSS/API/OpenCLI)
source_channel_refs:
  # ── A. 政治与治理 ─────────────────────────────────
  - ansa
  - agi
  - adnkronos
  - rainews
  - tgcom24
  - sky-tg24
  - camera-it
  - senato-it
  - quirinale
  - interno-gov
  - opencli/governo-it
  - opencli/parlamento-it
  - opencli/openpolis
  - opencli/regione-lombardia
  - opencli/regione-lazio

  # ── B. 经济与商业 ─────────────────────────────────
  - ilsole24ore
  - bancaditalia
  - eni-group
  - opencli/confindustria
  - opencli/cgil-cisl-uil
  - api/borsa-italiana

  # ── C. 外交与国际关系 ─────────────────────────────
  - farnesina
  - opencli/osce-italy

  # ── D. 安全与防务 ─────────────────────────────────
  - difesa-it
  - polizia-stato
  - opencli/guardia-finanza
  - opencli/carabinieri

  # ── E. 司法与法治 ─────────────────────────────────
  - ilfattoquotidiano
  - anac
  - opencli/corte-costituzionale
  - opencli/csm

  # ── F. 社会与民生 ─────────────────────────────────
  - lastampa
  - ilmessaggero
  - ilsecoloxix
  - ilmattino
  - salute-gov
  - miur
  - fondazione-gimbe
  - opencli/inps

  # ── G. 科技与数字 ─────────────────────────────────
  - agid
  - garante-privacy
  - wired-it
  - startupitalia

  # ── H. 环境与能源 ─────────────────────────────────
  - enea
  - ispra
  - legambiente

  # ── I. 移民与人口 ─────────────────────────────────
  - unhcr-italy
  - iom-italy
  - open-migration

  # ── J. 文化与遗产 ─────────────────────────────────
  - repubblica
  - corriere
  - mic
  - unesco-it

  # ── K. 宗教与梵蒂冈 ──────────────────────────────
  - vatican-news
  - osservatore-romano
  - cei
  - aci-stampa

  # ── L. 涉华议题 ──────────────────────────────────
  - opencli/fondazione-italia-cina
  - opencli/cesi
  - api/istat-china-trade
  - api/gdelt-china-italy

  # ── M. Other 开放式兜底 ──────────────────────────
  - emm-italy
  - api/gnews-italy
  - api/newsapi-it
  - api/gdelt-italy
  - api/istat
  - opencli/wikipedia-current

  # ── 辅助源（非意大利专门） ────────────────────────
  - fao-rss
  - ansa-en
  - thelocal-it

# 各子系统规则/路由配置的相对路径（相对于项目根目录）
filter_rules_ref: config/filters/italy/default.yaml
classification_rules_ref: config/classification/rules-italy.yaml
sandbox_profile_ref: config/sandbox/default.yaml
provider_routes_ref: config/provider/routes.yaml
output_destinations_ref: config/output/destinations.yaml

# 意大利子轴开关，控制 classification 阶段哪些 country_axes 参与打分
# 详见 docs/news-classification-framework.md 和 docs/contracts-canonical.md §9
classification:
  country_axes:
    politics: true
    economics: true
    crime: true
    sports: false
    culture: true
    eu_relations: true
    china_italy_relations: true
    immigration: true
    energy: true
    judicial: true
