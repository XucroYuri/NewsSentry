# Schema: ../../schemas/targetconfig.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015, ADR-0016
target_id: italy
display_name: "意大利新闻监控"
monitoring_type: country
region_type: country

language_scope:
  primary: it
  secondary: [en]
  output: zh

timezone: Europe/Rome

# 引用的源渠道 ID，对应 config/sources/italy/{id}.yaml
source_channel_refs:
  - ansa
  - repubblica
  - corriere
  - agi
  - tgcom24
  - lastampa
  - ilfattoquotidiano
  - ansa-en
  - rainews
  - ilsole24ore
  - ansa-politica
  - ansa-economia
  - ilsecoloxix
  - open-migration
  - open-online
  - unesco-it
  - ansa-cultura
  - cei
  - aci-stampa
  - formiche
  - sky-tg24
  - open-politica
  - governo-it
  - api/gdelt-italy

# 各子系统规则/路由配置的相对路径（相对于项目根目录）
filter_rules_ref: config/filters/italy/default.yaml
classification_rules_ref: config/classification/rules-italy.yaml
sandbox_profile_ref: config/sandbox/default.yaml
provider_routes_ref: config/provider/routes.yaml
output_destinations_ref: config/output/destinations.yaml
glossary_ref: docs/it-zh-glossary.md

# 意大利子轴开关，控制 classification 阶段哪些 country_axes 参与打分
# 详见 docs/news-classification-framework.md 和 docs/contracts-canonical.md §9
# specific_axes: 仅本 target 有意义的轴，其他 target 的分类结果不允许包含这些轴
classification:
  specific_axes: [coalition, eu_role, region, china_italy_relations]
  country_axes:
    politics: true
    economics: true
    crime: true
    sports: false
    culture: true
    eu_relations: true
    china_italy_relations: true
    immigration: true
    energy: true
    judicial: true
  # 本国相关性关键词：命中越多 home_relevance 越高（每词+10，上限100）
  home_relevance_keywords:
    - "cina"
    - "china"
    - "cinese"
    - "chinese"
    - "via della seta"
    - "belt and road"
    - "pechino"
    - "beijing"
    - "shanghai"
    - "xi jinping"
    - "brics"

# 驻意记者站重点监测领域 — 中国视角优先级
focus_areas:
  - id: china-italy-relations
    weight: 2.0
    keywords: [cina, cinese, china, xi jinping, belt and road, via della seta]
  - id: diplomacy
    weight: 1.5
    keywords: [diplomazia, ambasciata, trattato, summit, g7, g20]
  - id: economy-trade
    weight: 1.5
    keywords: [export, import, commercio, dogana, bilaterale]
