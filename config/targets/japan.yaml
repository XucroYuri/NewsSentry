# Schema: ../../schemas/targetconfig.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015, ADR-0016
target_id: japan
display_name: "日本新闻监控"
monitoring_type: country
region_type: country

language_scope:
  primary: ja
  secondary: [en]
  output: zh

timezone: Asia/Tokyo

# 引用的源渠道 ID，对应 config/sources/japan/{id}.yaml
source_channel_refs:
  # ── A. 政治与治理 ─────────────────────────────────
  - nhk-news
  - asahi-politics
  - asahi-headlines

  # ── B. 经济与商业 ─────────────────────────────────
  - asahi-business

  # ── C. 外交与国际关系 ─────────────────────────────
  - asahi-international

  # ── D. 安全与防务 ─────────────────────────────────

  # ── F. 社会与民生 ─────────────────────────────────

  # ── G. 科技与数字 ─────────────────────────────────
  - asahi-digital

  # ── J. 文化与遗产 ─────────────────────────────────
  - asahi-culture

  # ── K. 涉华议题 ──────────────────────────────────
  - api/gdelt-china-japan

  # ── L. Other 开放式兜底 ──────────────────────────
  - api/gnews-japan
  - api/gdelt-japan

  # ── 辅助源（非日本专门） ────────────────────────
  - bbc-jp
  - japantimes-topstories

# 各子系统规则/路由配置的相对路径
filter_rules_ref: config/filters/japan/default.yaml
classification_rules_ref: config/classification/rules-japan.yaml
sandbox_profile_ref: config/sandbox/default.yaml
provider_routes_ref: config/provider/routes.yaml
output_destinations_ref: config/output/destinations.yaml

# 日本子轴开关 — 东亚维度适配
# 日本与意大利不同：china_japan_relations 权重大，immigration 权重低
classification:
  country_axes:
    politics: true
    economics: true
    crime: false
    sports: false
    culture: true
    eu_relations: false
    china_japan_relations: true
    immigration: false
    energy: true
    judicial: true
  home_relevance_keywords:
    - "中国"
    - "中国"
    - "北京"
    - "上海"
    - "習近平"
    - "習近平"
    - "一帯一路"
    - "belt and road"
    - "brics"
    - "中日"
    - "日中"
