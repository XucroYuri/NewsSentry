# Schema: ../../schemas/targetconfig.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015, ADR-0016
#
# 使用说明：复制此文件到 config/targets/{target_id}.yaml，
# 并将所有 <placeholder> 替换为实际值。
# 必须同步在 config/sources/{target_id}/ 下创建对应源渠道文件。

target_id: "<placeholder>"            # 全局唯一，字母数字加连字符
display_name: "<显示名称>"

language_scope:
  primary: "<ISO 639-1 主语言，如 it/fr/de>"
  secondary: []                        # 可选，辅助语言列表
  output: zh                           # 输出语言（中文为 zh）

timezone: "<IANA 时区，如 Europe/Rome>"

# 引用的源渠道 ID，对应 config/sources/{target_id}/{id}.yaml
source_channel_refs: []

# 各子系统规则/路由配置的相对路径（相对于项目根目录）
filter_rules_ref: config/filters/<target_id>/default.yaml
classification_rules_ref: config/classification/rules-v1.yaml
sandbox_profile_ref: config/sandbox/default.yaml
provider_routes_ref: config/provider/routes.yaml
output_destinations_ref: config/output/destinations.yaml

# country_axes 控制 classification 阶段哪些轴参与打分
# 仅启用与该目标新闻相关的轴，降低误判噪声
# 完整轴列表见 docs/news-classification-framework.md
classification:
  country_axes:
    politics: true
    economics: true
    crime: false
    sports: false
    culture: false
    eu_relations: false
    china_italy_relations: false    # 仅 Italy 目标使用，其他目标改为 false
    immigration: false
    energy: false
    judicial: false
