target_id: ireland
display_name: "爱尔兰新闻监控"
monitoring_type: country
region_type: country

language_scope:
  primary: en
  secondary: []
  output: zh

timezone: Europe/Dublin

source_channel_refs:
  - rte-headlines
  - rte-politics
  - rte-business
  - rte-ireland
  - rte-courts
  - thejournal-general

filter_rules_ref: config/filters/ireland/default.yaml
