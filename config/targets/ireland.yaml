    - "Dublin"
    - "Micheál Martin"
    - "Taoiseach"
    - "Oireachtas"
    - "Dáil"
    - "EU presidency"
    - "migration pact"
    - "housing"
    - "energy"
    - "FDI"
    - "China"
    - "Beijing"
    - "Common Travel Area"

