# Schema: ../../schemas/targetconfig.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015, ADR-0016
target_id: france
display_name: "法国新闻监控"
monitoring_type: country
region_type: country

language_scope:
  primary: fr
  secondary: [en]
  output: zh

timezone: Europe/Paris

# 引用的源渠道 ID，对应 config/sources/france/{id}.yaml
source_channel_refs:
  # ── A. 政治与治理 ─────────────────────────────────
  - lemonde-politics
  - lefigaro-politics
  - libe-politics
  - leparisien-politique

  # ── B. 经济与商业 ─────────────────────────────────
  - lesechos
  - lefigaro-business
  - leparisien-economie

  # ── C. 外交与国际关系 ─────────────────────────────
  - diplomatie-gouv
  - lemonde-international
  - rfi-france

  # ── D. 安全与防务 ─────────────────────────────────
  - defense-gouv

  # ── E. 司法与法治 ─────────────────────────────────
  - lemonde-justice

  # ── F. 社会与民生 ─────────────────────────────────
  - libe-social
  - lefigaro-social

  # ── G. 科技与数字 ─────────────────────────────────
  - lemonde-tech
  - usine-digitale

  # ── H. 环境与能源 ─────────────────────────────────
  - ecologie-gouv

  # ── I. 移民与人口 ─────────────────────────────────
  - ofii

  # ── J. 文化与遗产 ─────────────────────────────────
  - lemonde-culture

  # ── K. 涉华议题 ──────────────────────────────────
  - api/gdelt-china-france

  # ── L. 其他开放式兜底 ────────────────────────────
  - api/gnews-france
  - api/gdelt-france
  - reuters-fr
  - bbc-fr
  - france24-france

filter_rules_ref: config/filters/france/default.yaml
classification_rules_ref: config/classification/rules-france.yaml
sandbox_profile_ref: config/sandbox/default.yaml
provider_routes_ref: config/provider/routes.yaml
output_destinations_ref: config/output/destinations.yaml

# 法国子轴开关
classification:
  country_axes:
    politics: true
    economics: true
    crime: false
    sports: false
    culture: true
    eu_relations: true
    china_france_relations: true
    immigration: true
    energy: true
    judicial: true
  home_relevance_keywords:
    - "Chine"
    - "chinois"
    - "Pékin"
    - "Beijing"
    - "Shanghai"
    - "Xi Jinping"
    - "nouvelle route de la soie"
    - "Belt and Road"
    - "BRICS"
