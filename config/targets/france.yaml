# Schema: ../../schemas/targetconfig.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015, ADR-0016
target_id: france
display_name: "法国新闻监控"
monitoring_type: country
region_type: country

language_scope:
  primary: fr
  secondary: [en]
  output: zh

timezone: Europe/Paris

# 引用的源渠道 ID，对应 config/sources/france/{id}.yaml
source_channel_refs:
  - lemonde-politics
  - libe-politics
  - leparisien-politique
  - leparisien-economie
  - lemonde-international
  - rfi-france
  - defense-gouv
  - lemonde-justice
  - libe-social
  - lemonde-tech
  - usine-digitale
  - lemonde-culture
  - france24-france
  - franceinfo-titres
  - franceinfo-france
  - franceinfo-politique
  - franceinfo-economie
  - franceinfo-monde
  - public-senat
  - bfmtv-politique
  - bfmtv-economie
  - bfmtv-societe
  - api/gdelt-france
  - api/gdelt-china-france

filter_rules_ref: config/filters/france/default.yaml
classification_rules_ref: config/classification/rules-france.yaml
sandbox_profile_ref: config/sandbox/default.yaml
provider_routes_ref: config/provider/routes.yaml
output_destinations_ref: config/output/destinations.yaml

# 法国子轴开关
classification:
  country_axes:
    politics: true
    economics: true
    crime: false
    sports: false
    culture: true
    eu_relations: true
    china_france_relations: true
    immigration: true
    energy: true
    judicial: true
  home_relevance_keywords:
    - "Chine"
    - "chinois"
    - "Pékin"
    - "Beijing"
    - "Shanghai"
    - "Xi Jinping"
    - "nouvelle route de la soie"
    - "Belt and Road"
    - "BRICS"
