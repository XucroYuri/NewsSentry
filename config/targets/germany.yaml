# Schema: ../../schemas/targetconfig.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015, ADR-0016
target_id: germany
display_name: "德国新闻监控"
monitoring_type: country
region_type: country

language_scope:
  primary: de
  secondary: [en]
  output: zh

timezone: Europe/Berlin

# 引用的源渠道 ID，对应 config/sources/germany/{id}.yaml
source_channel_refs:
  - tagesschau-politics
  - spiegel-politics
  - faz-politics
  - handelsblatt
  - faz-business
  - spiegel-international
  - heise
  - deutschlandfunk-nachrichten
  - deutschlandfunk-wirtschaft
  - dw-de
  - dw-top
  - ntv-politik
  - ntv-wirtschaft
  - ntv-panorama
  - spiegel-wirtschaft
  - spiegel-netzwelt
  - spiegel-wissenschaft
  - spiegel-panorama
  - spiegel-kultur
  - zeit-politics-feed
  - zeit-wirtschaft-feed
  - zeit-social-feed
  - zeit-digital-feed
  - zdf-heute
  - zdf-politik
  - zdf-wirtschaft
  - faz-aktuell
  - api/gdelt-china-germany
  - api/gdelt-germany

filter_rules_ref: config/filters/germany/default.yaml
classification_rules_ref: config/classification/rules-germany.yaml
sandbox_profile_ref: config/sandbox/default.yaml
provider_routes_ref: config/provider/routes.yaml
output_destinations_ref: config/output/destinations.yaml

# 德国子轴开关
classification:
  country_axes:
    politics: true
    economics: true
    crime: false
    sports: false
    culture: true
    eu_relations: true
    china_germany_relations: true
    immigration: true
    energy: true
    judicial: true
  home_relevance_keywords:
    - "China"
    - "chinesisch"
    - "Peking"
    - "Beijing"
    - "Shanghai"
    - "Xi Jinping"
    - "Belt and Road"
    - "Seidenstraße"
    - "BRICS"
