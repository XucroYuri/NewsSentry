# Schema: ../../schemas/targetconfig.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015, ADR-0016
target_id: germany
display_name: "德国新闻监控"
monitoring_type: country
region_type: country

language_scope:
  primary: de
  secondary: [en]
  output: zh

timezone: Europe/Berlin

# 引用的源渠道 ID，对应 config/sources/germany/{id}.yaml
source_channel_refs:
  # ── A. 政治与治理 ─────────────────────────────────
  - tagesschau-politics
  - spiegel-politics
  - zeit-politics
  - faz-politics
  - tagesspiegel-news

  # ── B. 经济与商业 ─────────────────────────────────
  - handelsblatt
  - faz-business
  - destatis-aktuell

  # ── C. 外交与国际关系 ─────────────────────────────
  - auswaertiges-amt
  - spiegel-international

  # ── D. 安全与防务 ─────────────────────────────────
  - bmvg

  # ── E. 司法与法治 ─────────────────────────────────
  - spiegel-justice

  # ── F. 社会与民生 ─────────────────────────────────
  - zeit-social
  - tagesschau-social

  # ── G. 科技与数字 ─────────────────────────────────
  - heise
  - zeit-digital

  # ── H. 环境与能源 ─────────────────────────────────
  - bmu

  # ── I. 移民与人口 ─────────────────────────────────
  - bamf

  # ── J. 文化与遗产 ─────────────────────────────────
  - zeit-culture

  # ── K. 涉华议题 ──────────────────────────────────
  - api/gdelt-china-germany

  # ── L. 其他开放式兜底 ────────────────────────────
  - api/gnews-germany
  - api/gdelt-germany
  - reuters-de
  - bbc-de

filter_rules_ref: config/filters/germany/default.yaml
classification_rules_ref: config/classification/rules-germany.yaml
sandbox_profile_ref: config/sandbox/default.yaml
provider_routes_ref: config/provider/routes.yaml
output_destinations_ref: config/output/destinations.yaml

# 德国子轴开关
classification:
  country_axes:
    politics: true
    economics: true
    crime: false
    sports: false
    culture: true
    eu_relations: true
    china_germany_relations: true
    immigration: true
    energy: true
    judicial: true
  home_relevance_keywords:
    - "China"
    - "chinesisch"
    - "Peking"
    - "Beijing"
    - "Shanghai"
    - "Xi Jinping"
    - "Belt and Road"
    - "Seidenstraße"
    - "BRICS"
