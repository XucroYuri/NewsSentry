# Schema: ../../schemas/outputdestinations.schema.json
# 契约: docs/contracts-canonical.md §8
# ADR: ADR-0002, ADR-0025
#
# v1/v1.5 默认产出本地 Markdown 草稿，外部推送（飞书/邮件/Telegram）默认禁用。
# 禁止在此配置自动向外部平台发布；告警只负责通知，不负责发布。

destinations:

  - destination_id: obsidian_target_drafts
    type: obsidian_markdown
    enabled: true
    path: "./data/{target_id}/drafts/"
    # 文件名模板：日期-来源-ID 短码
    # {published_at_date} 格式 YYYY-MM-DD
    # {id_short} 为 NewsEvent.id 前 8 位
    filename_template: "{published_at_date}-{source_id}-{id_short}.md"
    # YAML frontmatter 字段映射（Jinja2 风格模板）
    frontmatter:
      pipeline_stage: "{{ pipeline_stage }}"
      news_value_score: "{{ news_value_score }}"
      china_relevance: "{{ china_relevance }}"
      sentiment_score: "{{ sentiment_score }}"
      l0: "{{ metadata.classification.l0 }}"
      l1: "{{ metadata.classification.l1 }}"
      source_id: "{{ source_id }}"
      cluster_id: "{{ cluster_id }}"
      run_id: "{{ run_id }}"

  - destination_id: obsidian_target_evaluated
    type: obsidian_markdown
    enabled: true
    path: "./data/{target_id}/evaluated/"
    filename_template: "{published_at_date}-{source_id}-{id_short}.md"
    # 仅写入高价值事件（judge 阶段 recommendation 为 publish 或 review）
    filter:
      min_news_value_score: 60
      recommendation: ["publish", "review"]
    frontmatter:
      pipeline_stage: "{{ pipeline_stage }}"
      news_value_score: "{{ news_value_score }}"
      china_relevance: "{{ china_relevance }}"
      recommendation: "{{ judge_result.recommendation }}"
      l0: "{{ metadata.classification.l0 }}"
      l1: "{{ metadata.classification.l1 }}"

  - destination_id: feishu_webhook_high_value
    type: feishu_webhook
    enabled: false                        # 需配置 FEISHU_WEBHOOK_URL 后手动启用
    url: "${FEISHU_WEBHOOK_URL}"          # 从环境变量读取，禁止硬编码 URL
    filter:
      min_news_value_score: 80
      recommendation: ["publish"]
    notes: "Phase 17 告警推送：高价值+涉华事件"

  - destination_id: feishu_webhook_china
    type: feishu_webhook
    enabled: false
    url: "${FEISHU_WEBHOOK_URL}"
    filter:
      min_news_value_score: 60
      min_china_relevance: 50
      recommendation: ["publish", "review"]
    notes: "Phase 17 告警推送：中等价值+中国关联事件"

  - destination_id: email_alert
    type: email_smtp
    enabled: false                        # 需配置 SMTP 环境变量后手动启用
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    smtp_user: "${SMTP_USER}"
    smtp_password: "${SMTP_PASSWORD}"
    from: "${SMTP_USER}"
    to: []
    use_tls: true
    filter:
      min_news_value_score: 80
      recommendation: ["publish"]
    notes: "Phase 17 邮件告警：高价值事件"

  - destination_id: telegram_alert
    type: telegram_bot
    enabled: false                        # 需配置 TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    filter:
      min_news_value_score: 80
      min_china_relevance: 30
      recommendation: ["publish"]
    notes: "Phase 17 Telegram 告警：高价值+涉华事件（兼容旧配置）"

  # ── Phase 24 三级推送策略 ────────────────────────────────────────
  # L1: 原文快报 — news_value_score >= 60
  # L2: 翻译快报 — news_value_score >= 80，自动翻译中文标题
  # L3: 突发稿件 — news_value_score >= 90 + breaking，AI 生成报道方案

  - destination_id: telegram_l1
    type: telegram_bot
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    tier: L1
    filter:
      min_news_value_score: 60
      recommendation: ["publish", "review"]
    auto_translate: false
    notes: "Phase 24 L1 原文快报：标题+链接+评分"

  - destination_id: telegram_l2
    type: telegram_bot
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    tier: L2
    filter:
      min_news_value_score: 80
      recommendation: ["publish"]
    auto_translate: true
    notes: "Phase 24 L2 翻译快报：自动翻译中文标题"

  - destination_id: telegram_l3
    type: telegram_bot
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    tier: L3
    filter:
      min_news_value_score: 90
      recommendation: ["publish"]
    auto_translate: true
    auto_draft: true
    notes: "Phase 24 L3 突发稿件：翻译 + AI 报道方案草稿"

  - destination_id: feishu_l3
    type: feishu_webhook
    enabled: false
    url: "${FEISHU_WEBHOOK_URL}"
    tier: L3
    filter:
      min_news_value_score: 90
      recommendation: ["publish"]
    auto_translate: true
    auto_draft: true
    notes: "Phase 24 L3 飞书突发稿件"

  # ── 驻意记者站通用 Webhook 告警 ──────────────────────────────────
  # 用于对接编辑部内部系统，score>=90 的高价值事件实时推送
  # 配置 ALERT_WEBHOOK_URL 环境变量后手动启用
  - destination_id: bureau_webhook_high_value
    type: generic_webhook
    enabled: false
    url: "${ALERT_WEBHOOK_URL}"
    filter:
      min_news_value_score: 90
      recommendation: ["publish", "review"]
    auto_translate: true
    notes: "驻意记者站告警：score>=90 高价值事件 Webhook 推送"
