# Schema: ../../../schemas/sourcechannel.schema.json
source_id: gdelt-official-orgs
display_name: GDELT API — Official Organizations
type: api
endpoint:
  url: https://api.gdeltproject.org/api/v2/doc/doc
  method: GET
  params:
    query: 'UN OR IMF OR "World Bank" OR WTO OR OECD OR G7 OR G20 OR BRICS OR ASEAN OR OPEC OR IEA OR NATO'
    mode: ArtList
    maxrecords: 30
    format: json
api_mapping:
  items_key: articles
  title: title
  url: url
  content: snippet
  published_at: seendate
language: en
fetch_interval_minutes: 30
max_items_per_run: 30
timeout_seconds: 30
fetch_full_article: true
enabled: true
credibility_base: 0.72
health:
  last_success_at: null
  consecutive_failures: 0
