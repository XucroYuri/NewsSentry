# Schema: ../../schemas/sourcechannel.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015
#
# 使用说明：复制此文件到 config/sources/{target_id}/{source_id}.yaml，
# 并在对应 target.yaml 的 source_channel_refs 中添加 source_id。

source_id: "example-source"               # 全局唯一，字母数字加连字符
display_name: "Example Source"
type: rss                                 # 支持: rss | api | reddit | hackernews | twitter

# 原始 feed / API URL
url: "https://example.com/feed.xml"

# 基础可信度，0.0-1.0，由 judge 阶段乘以内容质量因子得出最终可信度
# 权威机构/通讯社: 0.88-0.95 | 主流报纸: 0.80-0.88 | 门户/博客: 0.50-0.75
credibility_base: 0.80

# 采集频率与限制
fetch_interval_minutes: 30
max_items_per_run: 50
timeout_seconds: 30
enabled: true

# 健康状态由 memory 模块写入，请勿手动修改
health:
  last_success_at: null        # ISO 8601 时间戳
  consecutive_failures: 0
