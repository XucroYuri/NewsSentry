# 社媒 KOL 账号清单模板
platform: "twitter"
dimension: "example"
collect_mode: opencli_bridge
session_profile_ref: config/session-profiles/italy/twitter.yaml

accounts:
  - handle: "@example"
    display_name: "Example Account"
    url: "https://x.com/example"
    tier: L3
    category: other
    monitor_mode: semi_active
    fetch_max_per_run: 10
    notes: ""
