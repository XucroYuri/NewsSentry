# Schema: ../../../schemas/sourcechannel.schema.json
source_id: openpolis
display_name: "Openpolis — OpenCLI"
type: opencli

tool_ref: opencli.fetch
tool_params:
  url: "https://www.openpolis.it/notizie/"
  selector: ".news-list .news-item"
  extract_fields:
    - title
    - url
    - date
    - summary

fetch_interval_minutes: 120
max_items_per_run: 15
timeout_seconds: 60
enabled: true
credibility_base: 0.80
sandbox_profile_ref: config/sandbox/default.yaml
health:
  last_success_at: null
  consecutive_failures: 0
