# Schema: ../../../schemas/sourcechannel.schema.json
source_id: corte-costituzionale
display_name: "Corte Costituzionale — OpenCLI"
type: opencli

tool_ref: opencli.fetch
tool_params:
  url: "https://www.cortecostituzionale.it/comunicatiStampa.do"
  selector: ".comunicati-lista .comunicato-item"
  extract_fields:
    - title
    - url
    - date
    - summary

fetch_interval_minutes: 120
max_items_per_run: 10
timeout_seconds: 60
enabled: true
credibility_base: 0.95
sandbox_profile_ref: config/sandbox/default.yaml
health:
  last_success_at: null
  consecutive_failures: 0
