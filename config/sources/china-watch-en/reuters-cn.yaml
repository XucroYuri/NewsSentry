# Schema: ../../schemas/sourcechannel.schema.json
# 契约: docs/contracts-canonical.md §2
# ADR: ADR-0015
source_id: reuters-cn
display_name: "Reuters - China News"
type: rss
url: "https://www.reutersagency.com/feed/?taxonomy=china"

# credibility_base: 0-100 量纲中的基础可信度，详见 contracts-canonical.md §4
credibility_base: 0.90

fetch_interval_minutes: 15
max_items_per_run: 50
timeout_seconds: 30
# 注意: Reuters 可能不提供免费 RSS；如果此 URL 无法正常工作，
# 请标记 enabled: false 并注明原因。
enabled: true

health:
  last_success_at: null        # ISO 8601，首次成功后由 memory 模块写入
  consecutive_failures: 0
