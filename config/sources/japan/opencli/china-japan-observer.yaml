# Schema: ../../../schemas/sourcechannel.schema.json
source_id: china-japan-observer
display_name: "China-Japan Observer — OpenCLI"
type: opencli

tool_ref: opencli.fetch
tool_params:
  url: "https://www.mofa.go.jp/region/asia-paci/china/index.html"
  selector: "main, article, body"
  extract_fields:
    - title
    - url
    - date
    - summary

fetch_interval_minutes: 60
max_items_per_run: 20
timeout_seconds: 60
enabled: false
deprecated: true
deprecated_reason: "占位配置：异步采集路径暂未启用 OpenCLI source，涉华采集先由 GDELT/GNews API 承接。"
credibility_base: 0.82
sandbox_profile_ref: config/sandbox/default.yaml
health:
  last_success_at: null
  consecutive_failures: 0
