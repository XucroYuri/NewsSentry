<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background circle — indigo, deep and trustworthy -->
  <circle cx="256" cy="256" r="220" fill="url(#bgGrad)"/>

  <!-- Three rising signal bars — news monitoring, escalation -->
  <rect x="190" y="220" width="16" height="60" rx="8" fill="url(#warmGrad)" opacity="0.5"/>
  <rect x="214" y="200" width="16" height="80" rx="8" fill="url(#warmGrad)" opacity="0.7"/>
  <rect x="238" y="172" width="16" height="108" rx="8" fill="url(#warmGrad)"/>

  <!-- Second cluster — mirrored, representing global coverage -->
  <rect x="282" y="220" width="16" height="60" rx="8" fill="url(#warmGrad)" opacity="0.5"/>
  <rect x="306" y="200" width="16" height="80" rx="8" fill="url(#warmGrad)" opacity="0.7"/>
  <rect x="330" y="180" width="16" height="100" rx="8" fill="url(#warmGrad)" opacity="0.85"/>

  <!-- Center-eye — sentinel watch -->
  <circle cx="256" cy="310" r="14" fill="url(#warmGrad)"/>
  <circle cx="256" cy="310" r="6" fill="#1e1b4b"/>
</svg>
