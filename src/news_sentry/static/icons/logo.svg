<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="232" fill="url(#bgGrad)"/>

  <!-- Globe: horizontal equator line -->
  <ellipse cx="256" cy="256" rx="180" ry="72" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.3"/>

  <!-- Globe: vertical meridian -->
  <ellipse cx="256" cy="256" rx="72" ry="180" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.25"/>

  <!-- "NS" monogram — balanced sizes -->
  <text x="256" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="100" font-weight="700" fill="url(#goldGrad)" letter-spacing="-2">N</text>
  <text x="256" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="400" fill="url(#goldGrad)" opacity="0.9" letter-spacing="6">S</text>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.3"/>
</svg>
