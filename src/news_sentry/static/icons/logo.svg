<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background shield -->
  <rect x="24" y="24" width="464" height="464" rx="32" fill="url(#bg)" stroke="url(#accent)" stroke-width="3"/>

  <!-- Radar/satellite globe arc -->
  <circle cx="256" cy="240" r="140" stroke="url(#accent)" stroke-width="2.5" fill="none" opacity="0.3"/>
  <circle cx="256" cy="240" r="100" stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.2"/>
  <circle cx="256" cy="240" r="60" stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.15"/>

  <!-- Horizontal scan lines (news monitoring) -->
  <line x1="96" y1="160" x2="416" y2="160" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="200" x2="392" y2="200" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="120" y1="240" x2="360" y2="240" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="120" y1="280" x2="380" y2="280" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>

  <!-- AI sparkle/star in top right -->
  <g transform="translate(370, 140)">
    <path d="M0,-18 L5,-6 L18,-6 L8,3 L12,16 L0,8 L-12,16 L-8,3 L-18,-6 L-5,-6 Z" fill="#fbbf24" opacity="0.9"/>
  </g>

  <!-- Sentinel shield/dot in center -->
  <circle cx="256" cy="240" r="6" fill="#06b6d4"/>

  <!-- Bottom text area — "NEWS SENTRY" -->
  <text x="256" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#accent)" letter-spacing="4">NEWS SENTRY</text>

  <!-- Tagline -->
  <text x="256" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" letter-spacing="6">AI-POWERED MONITORING</text>
</svg>
