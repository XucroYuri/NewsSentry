<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="232" fill="url(#bgGrad)"/>

  <!-- Scanning beam -->
  <path d="M120 180 L392 180" stroke="url(#beamGrad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M140 220 L372 220" stroke="url(#beamGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Central shield -->
  <path d="M256 140 L372 200 L372 300 Q372 370 256 400 Q140 370 140 300 L140 200 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="4" stroke-linejoin="round"/>

  <!-- Inner eye/watch dot -->
  <circle cx="256" cy="270" r="8" fill="#38bdf8"/>
  <circle cx="256" cy="270" r="4" fill="#0f172a"/>
</svg>
