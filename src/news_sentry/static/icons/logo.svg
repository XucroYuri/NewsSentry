<svg xmlns="http://www.w3.org/2000/svg" width="512" height="200" viewBox="0 0 512 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="10" y="25" width="492" height="150" rx="75" fill="url(#bgGrad)"/>

  <!-- Horizon line -->
  <line x1="40" y1="130" x2="472" y2="130" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>

  <!-- Sentinel tower -->
  <rect x="220" y="60" width="18" height="70" rx="3" fill="#fbbf24" opacity="0.6"/>
  <rect x="274" y="60" width="18" height="70" rx="3" fill="#fbbf24" opacity="0.6"/>

  <!-- Crossbeam connecting towers -->
  <rect x="229" y="75" width="56" height="8" rx="2" fill="#fbbf24" opacity="0.7"/>

  <!-- Searchlight beam sweeping right -->
  <path d="M256 85 L480 40 L480 130 Z" fill="url(#beamGrad)" opacity="0.3"/>

  <!-- "N E W S   S E N T R Y" below -->
  <text x="256" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#fbbf24" opacity="0.8" letter-spacing="6">NEWS SENTRY</text>
</svg>
