<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Sentry — 新闻情报监控</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="News Sentry">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src *;">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <!-- 连接设置页（未认证时全屏显示） -->
  <div id="connectPage" class="connect-page">
    <div class="connect-card">
      <!-- 模式切换标签 -->
      <div class="connect-mode-switch">
        <button class="mode-tab active" data-mode="local">本地服务</button>
        <button class="mode-tab" data-mode="cloud">云端服务</button>
      </div>

      <!-- Logo -->
      <div class="connect-logo">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <h1 class="connect-title">News Sentry</h1>
      <p class="connect-subtitle">新闻智能监控平台</p>

      <!-- 表单 -->
      <div class="connect-form">
        <div class="connect-field">
          <label>👤 用户名</label>
          <input type="text" id="connectUsername" placeholder="输入用户名" autocomplete="username">
        </div>
        <div class="connect-field">
          <label>🌐 服务器地址</label>
          <input type="url" id="connectServer" placeholder="http://localhost:8000">
        </div>
        <div class="connect-field">
          <label>🔒 密码</label>
          <input type="password" id="connectPassword" placeholder="输入密码" autocomplete="current-password">
        </div>
        <div class="connect-field">
          <label>🌍 Language / 语言</label>
          <select id="connectLanguage">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
        <button id="connectBtn" class="connect-btn">登录</button>
        <p class="connect-hint">首次使用？请使用管理员账户登录</p>
        <p id="connectError" class="connect-error" style="display:none;"></p>
      </div>

      <!-- 服务器状态 -->
      <div class="connect-status" id="connectStatus">
        <span class="status-dot" id="connectStatusDot"></span>
        <span id="connectStatusText">检测中...</span>
      </div>
    </div>
  </div>

  <!-- 离线横幅 -->
  <div id="offlineBanner" class="offline-banner" style="display:none;">网络连接已断开</div>

  <!-- 侧边栏遮罩（移动端） -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- 侧边导航栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <span class="brand-text">News Sentry</span>
    </div>

    <nav class="sidebar-nav">
      <!-- 第一层：每日工作台 -->
      <div class="nav-section-label">每日工作台</div>
      <a href="#/news/overview" class="nav-item" data-section="news">
        <span class="nav-icon">📰</span>
        <span>新闻情报</span>
        <span class="nav-badge" id="badgeNews" style="display:none;">0</span>
      </a>
      <a href="#/alerts/live" class="nav-item" data-section="alerts">
        <span class="nav-icon">🔔</span>
        <span>告警通知</span>
        <span class="nav-badge" id="badgeAlerts" style="display:none;">0</span>
      </a>

      <!-- 第二层：系统管理 -->
      <div class="nav-section-label">系统管理</div>
      <a href="#/ops/status" class="nav-item" data-section="ops">
        <span class="nav-icon">📊</span>
        <span>运行监控</span>
      </a>
      <a href="#/feedback/records" class="nav-item" data-section="feedback">
        <span class="nav-icon">💬</span>
        <span>反馈优化</span>
      </a>

      <!-- 第三层：高级配置（默认折叠） -->
      <div class="nav-section-label nav-collapsible-toggle" id="configToggle">
        高级配置 <span class="toggle-arrow">▼</span>
      </div>
      <div class="nav-collapsible" id="configNav" style="display:none;">
        <a href="#/config/target" class="nav-item" data-section="config">
          <span class="nav-icon">🔧</span>
          <span>配置中心</span>
        </a>
        <a href="#/settings/password" class="nav-item" data-section="settings">
          <span class="nav-icon">⚙️</span>
          <span>系统设置</span>
        </a>
      </div>
    </nav>

    <!-- 侧边栏底部状态栏 -->
    <div class="sidebar-footer">
      <div class="footer-status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">检测中...</span>
      </div>
      <div class="footer-heartbeat" id="heartbeatBar">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="bar"></span><span class="bar"></span>
      </div>
      <div class="footer-meta">
        <span class="footer-user" id="footerUser"></span>
        <span class="footer-collect" id="footerCollect"></span>
        <a href="#/settings/password" class="footer-settings">设置</a>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main-content" id="mainContent">
    <header class="top-bar">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="打开菜单">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="target-selector">
        <select id="targetSelect" aria-label="选择监控目标">
          <option value="">加载中...</option>
        </select>
      </div>
    </header>

    <!-- Tab 栏 -->
    <div class="tab-bar" id="tabBar"></div>

    <!-- 页面内容容器 -->
    <div class="page-container" id="pageContainer">
      <div class="loading-spinner" id="globalSpinner">
        <div class="spinner"></div>
        <p>正在加载...</p>
      </div>
    </div>
  </main>

  <!-- 导入弹窗 -->
  <div id="importModal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>批量导入事件</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="import-dropzone">
          <p>拖放 JSON 文件到此处</p>
          <input type="file" id="importFile" accept=".json" style="display:none;">
          <button class="btn-secondary" id="importFileBtn">选择文件</button>
        </div>
        <textarea id="importJson" rows="8" placeholder='或粘贴 JSON 数组...'></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">取消</button>
        <button class="btn-primary" id="importSubmit">导入</button>
      </div>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div id="confirmModal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="confirmTitle">确认操作</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">取消</button>
        <button class="btn-primary" id="confirmOk">确认</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
