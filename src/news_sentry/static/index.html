<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Sentry — 新闻情报监控</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="News Sentry">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src *;">
  <link rel="stylesheet" href="style.css?v=20260527m">
  <link rel="stylesheet" href="public.css?v=20260527d">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
  <!-- 连接设置页（未认证时全屏显示） -->
  <div id="connectPage" class="connect-page" style="display:none;">
    <div class="connect-card">
      <div class="connect-brand brand-lockup">
        <span class="brand-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </span>
        <h1 class="brand-text connect-brand-title">News Sentry</h1>
      </div>
      <p class="connect-subtitle">管理后台登录</p>

      <!-- 表单 -->
      <div class="connect-form">
        <div class="connect-field">
          <label>用户名</label>
          <input type="text" id="connectUsername" placeholder="输入用户名" autocomplete="username">
        </div>
        <input type="hidden" id="connectServer">
        <div class="connect-field">
          <label>密码</label>
          <input type="password" id="connectPassword" placeholder="输入密码" autocomplete="current-password">
        </div>
        <button id="connectBtn" class="connect-btn">登录</button>
        <p class="connect-hint">新闻情报可直接浏览；配置、运维和写操作需要管理员账户。</p>
        <p id="connectError" class="connect-error" style="display:none;"></p>
      </div>
    </div>
  </div>

  <!-- 离线横幅 -->
  <div id="offlineBanner" class="offline-banner" style="display:none;">网络连接已断开</div>

  <!-- 侧边栏遮罩（移动端） -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- 侧边导航栏 -->
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand brand-lockup" href="#/news/feed" aria-label="返回 News Sentry 首页">
      <span class="brand-icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </span>
      <span class="brand-text">News Sentry</span>
    </a>

    <nav class="sidebar-nav">
      <div class="nav-section-label">管理控制台</div>
      <a href="#/admin/targets" class="nav-item" data-section="targets">
        <span class="nav-icon">T</span>
        <span>目标工作台</span>
      </a>
      <a href="#/admin/home/overview" class="nav-item" data-section="home">
        <span class="nav-icon">H</span>
        <span>管理总览</span>
      </a>
      <a href="#/admin/collection/control" class="nav-item" data-section="collection">
        <span class="nav-icon">C</span>
        <span>采集与信源</span>
        <span class="nav-badge" id="badgeNews" style="display:none;">0</span>
      </a>
      <a href="#/admin/review/queue" class="nav-item" data-section="review">
        <span class="nav-icon">R</span>
        <span>审核与反馈</span>
        <span class="nav-badge" id="badgeAlerts" style="display:none;">0</span>
      </a>
      <a href="#/admin/ops/runs" class="nav-item" data-section="ops">
        <span class="nav-icon">O</span>
        <span>系统运维</span>
      </a>
      <a href="#/admin/advanced/filters" class="nav-item" data-section="advanced">
        <span class="nav-icon">A</span>
        <span>高级管理</span>
      </a>
    </nav>

    <!-- 侧边栏底部状态栏 -->
    <div class="sidebar-footer">
      <div class="footer-status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">检测中...</span>
      </div>
      <div class="footer-heartbeat" id="heartbeatBar">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="bar"></span><span class="bar"></span>
      </div>
      <div class="footer-meta">
        <span class="footer-user" id="footerUser"></span>
        <span class="footer-collect" id="footerCollect"></span>
        <a href="#/admin/advanced/account" class="footer-settings">设置</a>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main-content" id="mainContent">
    <header class="public-top-bar" id="publicTopBar" style="display:none;">
      <a class="public-brand brand-lockup" href="#/news/feed">
        <span class="brand-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </span>
        <span class="brand-text">News Sentry</span>
      </a>
      <a class="public-admin-btn" id="publicAdminBtn" href="#/admin/login">管理后台</a>
    </header>

    <header class="top-bar admin-page-topbar" id="adminTopBar">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="打开菜单">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="breadcrumb" id="breadcrumb"></div>
    </header>

    <!-- Tab 栏 -->
    <div class="tab-bar" id="tabBar"></div>

    <!-- 页面内容容器 -->
    <div class="page-container" id="pageContainer">
      <div class="loading-spinner" id="globalSpinner">
        <div class="spinner"></div>
        <p>正在加载...</p>
      </div>
    </div>
  </main>

  <!-- 导入弹窗 -->
  <div id="importModal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>批量导入事件</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="import-dropzone">
          <p>拖放 JSON 文件到此处</p>
          <input type="file" id="importFile" accept=".json" style="display:none;">
          <button class="btn-secondary" id="importFileBtn">选择文件</button>
        </div>
        <textarea id="importJson" rows="8" placeholder='或粘贴 JSON 数组...'></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">取消</button>
        <button class="btn-primary" id="importSubmit">导入</button>
      </div>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div id="confirmModal" class="modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="confirmTitle">确认操作</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary modal-cancel">取消</button>
        <button class="btn-primary" id="confirmOk">确认</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js?v=20260528a"></script>
</body>
</html>
