# News Sentry — Cloudflare Workers + Pages 部署配置
# 用法:
#   cd frontend/cloudflare
#   npx wrangler deploy                    # 部署 Worker
#   npx wrangler d1 execute ns-db --file=db/schema.sql  # 初始化 D1
#   npx wrangler pages deploy dist/cloudflare/          # 部署 SPA 静态文件

name = "news-sentry-api"
main = "workers/index.ts"
compatibility_date = "2026-06-24"

# 自定义域名路由（Worker → api.news-sentry.com）
routes = [
  { pattern = "api.news-sentry.com", custom_domain = true }
]

[vars]
NEWS_SENTRY_RUNTIME = "cloudflare-native"

[triggers]
crons = ["*/15 * * * *", "7,37 * * * *", "11 * * * *"]

[observability]
enabled = true
head_sampling_rate = 0.1

[observability.logs]
enabled = true
head_sampling_rate = 1.0
invocation_logs = true
persist = true

[observability.traces]
enabled = true
head_sampling_rate = 0.1
persist = true

[secrets]
required = [
  "GEMINI_API_KEY",
  "OPENROUTER_API_KEY",
  "NVIDIA_API_KEY",
  "OPENCODE_API_KEY",
  "REKA_API_KEY",
  "AGNES_API_KEY",
]

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "ns-db"
database_id = "35a52961-e7e1-41ef-934e-7a63882ba465"

# 生产环境（可选，覆盖默认值）
[env.production]
# Keep the custom domain bound to the top-level Worker deployment.
routes = []

[env.production.vars]
NEWS_SENTRY_RUNTIME = "cloudflare-native"

[env.production.secrets]
required = [
  "GEMINI_API_KEY",
  "OPENROUTER_API_KEY",
  "NVIDIA_API_KEY",
  "OPENCODE_API_KEY",
  "REKA_API_KEY",
  "AGNES_API_KEY",
]

[[env.production.d1_databases]]
binding = "DB"
database_name = "ns-db"
database_id = "35a52961-e7e1-41ef-934e-7a63882ba465"

[[env.production.containers]]
name = "news-sentry-container"
class_name = "NewsSentryContainer"
image = "../../Dockerfile"
max_instances = 2
instance_type = "basic"

[env.production.containers.ssh]
enabled = false

[[env.production.durable_objects.bindings]]
name = "NEWS_SENTRY_CONTAINER"
class_name = "NewsSentryContainer"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["NewsSentryContainer"]

# 开发环境
[env.dev]
[env.dev.vars]
NEWS_SENTRY_RUNTIME = "cloudflare-native-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "ns-db-dev"
database_id = "ns-db-dev"

# 本地开发（wrangler dev）
# D1 本地数据自动持久化到 .wrangler/state/

[[containers]]
name = "news-sentry-container"
class_name = "NewsSentryContainer"
image = "../../Dockerfile"
max_instances = 2
instance_type = "basic"

[containers.ssh]
enabled = false

[[durable_objects.bindings]]
name = "NEWS_SENTRY_CONTAINER"
class_name = "NewsSentryContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NewsSentryContainer"]
