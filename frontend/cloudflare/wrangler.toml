# News Sentry — Cloudflare Workers + Pages 部署配置
# 用法:
#   cd frontend/cloudflare
#   npx wrangler deploy                    # 部署 Worker
#   npx wrangler d1 execute ns-db --file=db/schema.sql  # 初始化 D1
#   npx wrangler pages deploy dist/cloudflare/          # 部署 SPA 静态文件

name = "news-sentry-api"
main = "workers/index.ts"
compatibility_date = "2026-06-24"

# 自定义域名路由（Worker → api.news-sentry.com）
routes = [
  { pattern = "api.news-sentry.com", custom_domain = true }
]

[vars]
# Container/FastAPI fallback for authenticated admin/runtime surfaces.
BACKEND_ORIGIN = "https://news-sentry.com"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "ns-db"
database_id = "35a52961-e7e1-41ef-934e-7a63882ba465"

# 生产环境（可选，覆盖默认值）
[env.production]
# Keep the custom domain bound to the top-level Worker deployment.
routes = []

[env.production.vars]
BACKEND_ORIGIN = "https://news-sentry.com"

[[env.production.d1_databases]]
binding = "DB"
database_name = "ns-db"
database_id = "35a52961-e7e1-41ef-934e-7a63882ba465"

# 开发环境
[env.dev]
[env.dev.vars]
BACKEND_ORIGIN = "http://127.0.0.1:8010"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "ns-db-dev"
database_id = "ns-db-dev"

# 本地开发（wrangler dev）
# D1 本地数据自动持久化到 .wrangler/state/
